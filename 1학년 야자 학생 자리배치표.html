<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1학년 야자 자리 배치 프로그램</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #ff85a2;
            /* Cherry Blossom Pink */
            --primary-dark: #f06292;
            --secondary: #7fb069;
            /* Soft Leaf Green */
            --bg-canvas: #fdf5f7;
            /* Softened off-white to reduce glare */
            --card-bg: #ffffff;
            --text-main: #4a2c2c;
            /* Deep Brownish Pink for contrast */
            --text-sub: #7d5a5a;
            --border: #fce4ec;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(255 133 162 / 0.1), 0 2px 4px -2px rgb(255 133 162 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(255 133 162 / 0.1);
            --drag-over: #fff0f3;

            /* Attendance Table Colors */
            --table-header: #fff5f7;
            --table-border: #fce4ec;
            --table-row-hover: #fffcfd;

            /* Room specific colors (Spring Edition) */
            --room-1-3: #f48fb1;
            /* Pink */
            --room-1-4: #81c784;
            /* Green */
            --room-1-5: #ffd54f;
            /* Sun Yellow */
            --room-1-6: #ffab91;
            /* Soft Coral */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-canvas);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255, 133, 162, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(127, 176, 105, 0.05) 0%, transparent 20%);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
            letter-spacing: -0.01em;
            position: relative;
            overflow-x: hidden;
        }

        /* Cherry Blossom Petals Animation */
        .blossom-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .petal {
            position: absolute;
            background-color: #ffc1d1;
            border-radius: 150% 0 150% 0;
            opacity: 0.5;
            /* Increased from 0.3 */
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translate(0, -10px) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.3;
            }

            90% {
                opacity: 0.3;
            }

            100% {
                transform: translate(100px, 100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Tree Background Elements */
        .tree-bg {
            position: fixed;
            pointer-events: none;
            z-index: -2;
            opacity: 0.18;
            /* Increased from 0.07 */
            filter: blur(0.5px);
        }

        .tree-left {
            bottom: -50px;
            left: -50px;
            width: 500px;
            transform: rotate(10deg);
        }

        .tree-right {
            top: -50px;
            right: -50px;
            width: 450px;
            transform: scaleX(-1) rotate(15deg);
        }

        header {
            max-width: 1300px;
            margin: 0 auto 50px;
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(to right, #ff4081, #7fb069);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(255, 133, 162, 0.1);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-sub);
            font-size: 0.95rem;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-danger {
            background: #fff1f2;
            color: #be123c;
            border: 1px solid #fecdd3;
        }

        .btn-danger:hover {
            background: #be123c;
            color: white;
            border-color: #be123c;
        }

        .day-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px rgba(255, 133, 162, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
            color: var(--primary);
            background: #fffcfd;
        }

        /* Layout Grid */
        .seating-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        .classroom-section {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
            overflow: hidden;
        }

        .classroom-section[data-room="1-3"] {
            border-top: 6px solid var(--room-1-3);
        }

        .classroom-section[data-room="1-4"] {
            border-top: 6px solid var(--room-1-4);
        }

        .classroom-section[data-room="1-5"] {
            border-top: 6px solid var(--room-1-5);
        }

        .classroom-section[data-room="1-6"] {
            border-top: 6px solid var(--room-1-6);
        }

        .classroom-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            flex: 1;
            min-width: 300px;
        }

        .room-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
            white-space: nowrap;
        }

        .room-notice {
            font-size: 0.85rem;
            color: #ef4444;
            font-weight: 600;
            padding: 6px 14px;
            background: #fef2f2;
            border-radius: 10px;
            border: 1px solid #fee2e2;
            line-height: 1.4;
            max-width: 600px;
        }

        .room-meta {
            color: var(--text-sub);
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .grid-6x5 {
            display: grid;
            grid-template-columns: 1fr 1fr 50px 1fr 1fr 50px 1fr 1fr;
            row-gap: 20px;
            margin: 40px 0;
        }


        .blackboard {
            width: 70%;
            height: 45px;
            background: #1e293b;
            border: 4px solid #334155;
            border-radius: 8px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            letter-spacing: 1.2em;
            font-size: 1.2rem;
            box-shadow: var(--shadow-md);
        }

        .seat {
            aspect-ratio: 1 / 1.15;
            border: 1.5px solid #cbd5e1;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-size: 0.85rem;
            position: relative;
            cursor: move;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .seat:not(.empty) {
            background: linear-gradient(to bottom right, #ffffff, #f8fafc);
        }

        .seat:not(.empty):hover {
            transform: scale(1.08) translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 10;
        }

        [data-room="1-3"] .seat:not(.empty):hover {
            border-color: var(--room-1-3);
        }

        [data-room="1-4"] .seat:not(.empty):hover {
            border-color: var(--room-1-4);
        }

        [data-room="1-5"] .seat:not(.empty):hover {
            border-color: var(--room-1-5);
        }

        [data-room="1-6"] .seat:not(.empty):hover {
            border-color: var(--room-1-6);
        }

        .seat.empty {
            border-style: dashed;
            background: #f1f5f9;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.04);
            cursor: default;
        }

        .seat.drag-over {
            background-color: var(--drag-over);
            border-color: var(--primary);
            border-style: solid;
            transform: scale(1.02);
        }

        .student-id {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 2px;
            pointer-events: none;
            opacity: 0.9;
        }

        [data-room="1-3"] .student-id {
            color: var(--room-1-3);
        }

        [data-room="1-4"] .student-id {
            color: var(--room-1-4);
        }

        [data-room="1-5"] .student-id {
            color: var(--room-1-5);
        }

        [data-room="1-6"] .student-id {
            color: var(--room-1-6);
        }

        .student-name {
            font-weight: 800;
            font-size: 1.35rem;
            color: var(--text-main);
            pointer-events: none;
        }

        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .spacer {
            pointer-events: none;
        }

        /* Tip decoration */
        .info-text {
            font-size: 0.9rem;
            color: var(--text-sub);
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Attendance List Styles */
        .attendance-container {
            max-width: 1000px;
            margin: 0 auto;
            display: none;
            flex-direction: column;
            gap: 40px;
        }

        .attendance-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 1rem;
        }

        .attendance-table th,
        .attendance-table td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid var(--table-border);
        }

        .attendance-table th {
            background-color: var(--table-header);
            font-weight: 700;
            color: var(--text-main);
        }

        .attendance-table tr:hover {
            background-color: var(--table-row-hover);
        }

        .attendance-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Attendance Table Column Widths */
        .col-num {
            width: 50px;
        }

        .col-id {
            width: 90px;
        }

        .col-name {
            width: 80px;
        }

        .col-check {
            width: 100px;
            white-space: nowrap;
        }

        .col-remark {
            width: auto;
        }

        .attendance-remark {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .attendance-remark:focus {
            border-color: var(--primary);
            outline: none;
            background: #f8fafc;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Attendance Highlighting */
        .seat.absent {
            background: #fff0f3 !important;
            border-color: #ff4d4f !important;
            box-shadow: 0 0 10px rgba(255, 77, 79, 0.2);
            transform: scale(1.02);
        }

        .seat.absent::after {
            content: '❌';
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 10px;
            color: #ff4d4f;
            font-weight: 900;
        }

        .seat.absent .student-name {
            color: #d32f2f;
        }

        .period-selector {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.5);
            padding: 5px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .period-btn {
            padding: 6px 16px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-sub);
            transition: all 0.2s;
        }

        .period-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .btn-save-sheet {
            background: #0f172a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
            margin-top: 10px;
        }

        .btn-save-sheet:hover {
            background: #334155;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-save-sheet:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Print Styles */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            header,
            button,
            .controls,
            .view-toggle,
            #toast,
            .blossom-container,
            .tree-bg,
            .login-overlay {
                display: none !important;
            }

            .seating-container {
                gap: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                display: block !important;
            }

            .classroom-section {
                box-shadow: none !important;
                border-radius: 0 !important;
                margin: 0 !important;
                padding: 8mm !important;
                page-break-after: always !important;
                width: 210mm !important;
                height: 297mm !important;
                box-sizing: border-box !important;
                display: flex !important;
                flex-direction: column !important;
                background: white !important;
                border: none !important;
                overflow: hidden !important;
                transform: none !important;
                /* disable any JS scale for each section */
            }

            .classroom-section[data-room="1-5"] {
                border-top: 8px solid #f59e0b !important;
            }

            .classroom-section[data-room="1-6"] {
                border-top: 8px solid #f43f5e !important;
            }

            .classroom-section[data-room="1-3"] {
                border-top: 8px solid #6366f1 !important;
            }

            .classroom-section[data-room="1-4"] {
                border-top: 8px solid #10b981 !important;
            }

            .classroom-header {
                display: flex !important;
                justify-content: space-between !important;
                align-items: center !important;
                border-bottom: 2px solid #e2e8f0 !important;
                margin-bottom: 5mm !important;
                padding-bottom: 3mm !important;
                flex-shrink: 0 !important;
            }

            .room-title {
                font-size: 1.8rem !important;
                font-weight: 900 !important;
                color: #0f172a !important;
            }

            .room-notice {
                display: none !important;
            }

            .room-meta {
                font-size: 0.95rem !important;
                color: #475569 !important;
                font-weight: 700 !important;
            }

            .blackboard {
                height: 30px !important;
                width: 55% !important;
                margin: 0 auto 4mm !important;
                flex-shrink: 0 !important;
                background: #1e293b !important;
                color: white !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                font-size: 1rem !important;
            }

            .grid-6x5 {
                flex: 1 !important;
                row-gap: 3mm !important;
                column-gap: 0 !important;
                grid-template-columns: 1fr 1fr 5mm 1fr 1fr 5mm 1fr 1fr !important;
                margin: 0 !important;
                overflow: hidden !important;
            }

            /* Reset aspect-ratio so cards don't overflow */
            .seat {
                aspect-ratio: unset !important;
                border: 1.5px solid #cbd5e1 !important;
                border-radius: 8px !important;
                background: white !important;
                box-shadow: none !important;
                height: 100% !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
                overflow: hidden !important;
                transform: none !important;
                transition: none !important;
                padding: 2px !important;
            }

            .seat.empty {
                border: 1px dashed #cbd5e1 !important;
                background: #f8fafc !important;
            }

            .student-name {
                font-size: 1.05rem !important;
                color: #0f172a !important;
                font-weight: 800 !important;
                line-height: 1.2 !important;
                margin: 0 !important;
                word-break: keep-all !important;
                text-align: center !important;
            }

            .student-id {
                font-size: 0.65rem !important;
                color: #64748b !important;
                font-weight: 600 !important;
                margin-bottom: 1px !important;
            }

            .seat-num-badge {
                font-size: 0.6rem !important;
                color: #94a3b8 !important;
            }

            .seat.absent {
                background: #fff0f3 !important;
                border-color: #ff4d4f !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .seat.absent::after {
                font-size: 10px !important;
            }

            .spacer {
                display: block !important;
            }
        }

        /* Login Overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 250, 252, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 15px;
            color: var(--text-main);
            font-size: 1.8rem;
            font-weight: 800;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
            margin-top: 10px;
            font-family: inherit;
        }

        .login-box input:focus {
            border-color: var(--primary);
        }

        .login-box button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
                background-size: 16px 16px;
            }

            header {
                padding: 25px 15px;
                border-radius: 16px;
                margin-bottom: 25px;
            }

            h1 {
                font-size: 1.5rem;
                text-align: center;
                justify-content: center;
                word-break: keep-all;
                flex-wrap: wrap;
            }

            .classroom-section {
                padding: 20px 15px;
                border-radius: 20px;
            }

            .room-title {
                font-size: 1.4rem;
            }

            .grid-6x5 {
                grid-template-columns: repeat(6, 1fr);
                gap: 8px;
                margin: 20px 0;
            }

            .grid-6x5 .spacer {
                display: none;
            }

            .seat {
                border-radius: 8px;
                font-size: 0.75rem;
                aspect-ratio: 1 / 1.2;
            }

            .student-name {
                font-size: 0.95rem;
            }

            .student-id {
                font-size: 0.65rem;
                margin-bottom: 0;
            }

            .teacher-desk {
                width: 100%;
                height: 36px;
                font-size: 0.9rem;
                margin-top: 15px;
            }

            /* Table Scroller for Mobile */
            .table-responsive {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin-top: 15px;
                border-radius: 12px;
            }

            .attendance-table {
                margin-top: 0;
                min-width: 100%;
                /* Changed from 480px to 100% to fit screen */
                table-layout: fixed;
            }

            .attendance-table th,
            .attendance-table td {
                padding: 8px 4px;
                font-size: 0.85rem;
                word-wrap: break-word;
            }

            .attendance-checkbox {
                width: 24px;
                height: 24px;
            }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');

            // 동일한 헤더 이름(교실, 번호 등)을 처리하기 위해 요일 접두사를 붙입니다.
            const days = ['월', '화', '수', '목', '금'];
            const processedHeaders = [...headers];

            let dayIdx = 0;
            let colInDay = 0;
            for (let i = 4; i < processedHeaders.length; i++) {
                const header = processedHeaders[i].trim();
                if (header === '교실' || header === '번호' || header === '1' || header === '2') {
                    // 월1, 월2, 월교실, 월번호 형태로 변경
                    const subHeader = header === '1' || header === '2' ? header : header;
                    processedHeaders[i] = days[dayIdx] + subHeader;
                    colInDay++;
                    if (colInDay === 4) {
                        dayIdx++;
                        colInDay = 0;
                    }
                } else if (days.some(d => header.startsWith(d))) {
                    // 이미 요일이 붙어있는 경우 (월1, 월2 등)
                    colInDay++;
                    if (colInDay === 4) {
                        dayIdx++;
                        colInDay = 0;
                    }
                }
            }

            return lines.slice(1).map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                const obj = {};
                processedHeaders.forEach((header, i) => {
                    if (header) obj[header] = values[i] || "";
                });
                return obj;
            });
        }

        const globalData = parseCSV(rawData);

        const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
        const todayIdx = new Date().getDay();
        const initialDay = (todayIdx >= 1 && todayIdx <= 5) ? daysMap[todayIdx] : '월';

        let currentDay = initialDay;
        let currentMode = 'seating';
        let currentPeriod = '1';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btnSeating').classList.toggle('active', mode === 'seating');
            document.getElementById('btnAttendance').classList.toggle('active', mode === 'attendance');

            const seatingDisp = document.getElementById('seatingDisplay');
            const attendanceDisp = document.getElementById('attendanceDisplay');

            if (mode === 'seating') {
                seatingDisp.style.display = 'flex';
                seatingDisp.classList.add('active');
                attendanceDisp.style.display = 'none';
                attendanceDisp.classList.remove('active');
                renderSeating();
            } else {
                seatingDisp.style.display = 'none';
                seatingDisp.classList.remove('active');
                attendanceDisp.style.display = 'flex';
                attendanceDisp.classList.add('active');
                renderAttendance();
            }
        }

        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDay = btn.dataset.day;
                renderSeating();
            });
        });

        function selectPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.period === period);
            });
            renderSeating();
        }

        const ROOM_CONFIGS = {
            '1-5': { cols: 6, maxRows: 5, gridCols: [0, 1, 3, 4, 6, 7] },
            '1-6': { cols: 6, maxRows: 5, gridCols: [0, 1, 3, 4, 6, 7] },
            '1-3': { cols: 6, maxRows: 5, gridCols: [0, 1, 3, 4, 6, 7] },
            '1-4': { cols: 6, maxRows: 5, gridCols: [0, 1, 3, 4, 6, 7] }
        };

        function getRoomStudents(day, period) {
            const periodCol = `${day}${period}`;
            const roomCol = `${day}교실`;
            const numCol = `${day}번호`;
            const results = { '1-3': [], '1-4': [], '1-5': [], '1-6': [] };

            globalData.forEach(s => {
                const isParticipating = s[periodCol] === '1';
                if (!isParticipating) return;
                const room = s[roomCol] ? s[roomCol].trim() : "";
                const seatNum = parseInt(s[numCol]);
                if (results[room]) {
                    results[room].push({ ...s, seatNum: !isNaN(seatNum) ? seatNum : null });
                }
            });
            return results;
        }

        function renderSeating() {
            const display = document.getElementById('seatingDisplay');
            display.innerHTML = '';
            const roomStudents = getRoomStudents(currentDay, currentPeriod);
            const rooms = ['1-3', '1-4', '1-5', '1-6'];

            rooms.forEach(roomName => {
                const students = roomStudents[roomName];
                if (students.length === 0 && (roomName === '1-3' || roomName === '1-4')) return;

                const config = ROOM_CONFIGS[roomName] || { cols: 6, maxRows: 5, gridCols: [0, 1, 3, 4, 6, 7] };
                const storageKey = `yajaArrangement1_${currentDay}_${roomName}_P${currentPeriod}`;
                let savedIds = JSON.parse(localStorage.getItem(storageKey));

                // 총 그리드 슬롯 계산 (5행 * 8열 = 40개 슬롯)
                let gridSeats = new Array(config.maxRows * 8).fill(undefined);

                // 1. 좌석 위치 설정 (6개 분단, 각 5행 = 30석)
                config.gridCols.forEach((gCol) => {
                    for (let r = 0; r < config.maxRows; r++) {
                        gridSeats[r * 8 + gCol] = null;
                    }
                });

                const currentStudentMap = {};
                students.forEach(s => currentStudentMap[s.학번] = s);

                if (savedIds && savedIds.length === gridSeats.length) {
                    // 저장된 배치가 있고 새 레이아웃 규격과 맞으면 매칭
                    savedIds.forEach((id, idx) => {
                        if (id && currentStudentMap[id] && gridSeats[idx] !== undefined) {
                            gridSeats[idx] = currentStudentMap[id];
                            delete currentStudentMap[id];
                        }
                    });
                } else {
                    // 데이터 기반 수직 배치 (1분단 1~5, 2분단 6~10...)
                    if (savedIds) localStorage.removeItem(storageKey);

                    students.forEach(s => {
                        if (s.seatNum) {
                            const cIdx = Math.floor((s.seatNum - 1) / 5);
                            const row = (s.seatNum - 1) % 5;
                            if (cIdx < config.gridCols.length) {
                                const col = config.gridCols[cIdx];
                                const gridIdx = row * 8 + col;
                                if (gridSeats[gridIdx] === null) {
                                    gridSeats[gridIdx] = s;
                                    delete currentStudentMap[s.학번];
                                }
                            }
                        }
                    });
                }

                // 남은 학생 배치 (이미 배정 안 된 학생)
                Object.values(currentStudentMap).forEach(s => {
                    const firstEmpty = gridSeats.indexOf(null);
                    if (firstEmpty !== -1) gridSeats[firstEmpty] = s;
                });

                // 현재 상태 저장 (공간 인덱스 그대로 저장)
                const idArr = gridSeats.map(val => (val && val.학번) ? val.학번 : (val === null ? "" : undefined));
                localStorage.setItem(storageKey, JSON.stringify(idArr));

                const section = document.createElement('div');
                section.className = 'classroom-section';
                section.setAttribute('data-room', roomName);
                section.innerHTML = `
                    <div class="classroom-header">
                        <div class="header-left">
                            <span class="room-title">${roomName}교실</span>
                            <span class="room-notice">지정된 고정 좌석입니다. 결석생 부분만 클릭하여 체크해주세요. (기본 출석)</span>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px;">
                            <span class="room-meta">${currentDay}요일 ${currentPeriod}교시 | 참여 ${students.length}명</span>
                        </div>
                    </div>
                    <div class="blackboard">칠판</div>
                    <div class="grid-6x5" style="grid-template-rows: repeat(${config.maxRows}, 1fr);"></div>
                `;

                const grid = section.querySelector('.grid-6x5');
                gridSeats.forEach((student, i) => {
                    const col = i % 8;
                    if (col === 2 || col === 5) {
                        const spacer = document.createElement('div');
                        spacer.className = 'spacer';
                        grid.appendChild(spacer);
                        return;
                    }

                    if (student === undefined) {
                        const emptySlot = document.createElement('div');
                        emptySlot.style.visibility = 'hidden';
                        grid.appendChild(emptySlot);
                        return;
                    }

                    const attendanceKey = `yajaAttendance1_${currentDay}_${roomName}_P${currentPeriod}`;
                    const savedAttendance = JSON.parse(localStorage.getItem(attendanceKey)) || {};
                    const isAbsent = student && savedAttendance[student.학번]?.checked;

                    const seat = document.createElement('div');
                    seat.className = 'seat' + (student ? '' : ' empty') + (isAbsent ? ' absent' : '');
                    seat.setAttribute('draggable', student ? 'true' : 'false');
                    seat.setAttribute('data-index', i);

                    if (student) {
                        // 학생 번호 표시 (CSV의 seatNum 또는 1-indexed 순서)
                        const displayNum = student.seatNum || "";
                        seat.innerHTML = `
                            <div class="student-id">${student.학번}</div>
                            <div class="student-name">${student.이름}</div>
                            <div class="seat-num-badge">${displayNum}</div>
                        `;
                        seat.onclick = () => toggleAttendance(student.학번, roomName);
                    } else {
                        seat.innerHTML = `<div class="seat-num-badge empty"></div>`;
                    }

                    seat.addEventListener('dragstart', handleDragStart);
                    seat.addEventListener('dragover', handleDragOver);
                    seat.addEventListener('dragleave', handleDragLeave);
                    seat.addEventListener('drop', handleDrop);
                    grid.appendChild(seat);
                });
                display.appendChild(section);
            });
        }

        let draggedElement = null;
        function handleDragStart(e) { draggedElement = this; e.dataTransfer.setData('text/plain', this.dataset.index); this.style.opacity = '0.4'; }
        function handleDragOver(e) { e.preventDefault(); this.classList.add('drag-over'); }
        function handleDragLeave() { this.classList.remove('drag-over'); }
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (draggedElement) draggedElement.style.opacity = '1';
            const sIdx = parseInt(e.dataTransfer.getData('text/plain'));
            const tIdx = parseInt(this.dataset.index);
            const sRoom = draggedElement.parentElement.parentElement.dataset.room;
            const tRoom = this.parentElement.parentElement.dataset.room;
            if (sRoom !== tRoom || sIdx === tIdx) return;
            const k = `yajaArrangement1_${currentDay}_${sRoom}_P${currentPeriod}`;
            let arr = JSON.parse(localStorage.getItem(k));
            [arr[sIdx], arr[tIdx]] = [arr[tIdx], arr[sIdx]];
            localStorage.setItem(k, JSON.stringify(arr));
            showToast();
            renderSeating();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function toggleAttendance(studentId, roomName) {
            const attendanceKey = `yajaAttendance1_${currentDay}_${roomName}_P${currentPeriod}`;
            const savedAttendance = JSON.parse(localStorage.getItem(attendanceKey)) || {};

            if (!savedAttendance[studentId]) {
                savedAttendance[studentId] = { checked: true, remark: '' };
            } else {
                savedAttendance[studentId].checked = !savedAttendance[studentId].checked;
            }

            localStorage.setItem(attendanceKey, JSON.stringify(savedAttendance));
            renderSeating();
        }


        function resetArrangement() {
            if (!confirm(`현재 요일(${currentDay}) ${currentPeriod}교시의 모든 배치를 고정 좌석으로 초기화하시겠습니까?`)) return;
            const rooms = ['1-3', '1-4', '1-5', '1-6'];
            rooms.forEach(room => {
                localStorage.removeItem(`yajaArrangement1_${currentDay}_${room}_P${currentPeriod}`);
            });
            showToast();
            renderSeating();
        }

        function resetAttendance() {
            if (!confirm(`현재 요일(${currentDay})의 ${currentPeriod}교시 출석 데이터를 모두 초기화하시겠습니까?`)) return;
            const rooms = ['1-3', '1-4', '1-5', '1-6'];
            rooms.forEach(room => {
                const key = `yajaAttendance1_${currentDay}_${room}_P${currentPeriod}`;
                localStorage.removeItem(key);
            });
            showToast();
            renderSeating();
        }

        async function saveAllAttendanceToSheet() {
            const gasUrl = document.getElementById('gasUrl').value.trim();
            if (!gasUrl) {
                alert('먼저 Google Apps Script URL을 입력해주세요.');
                return;
            }

            if (!confirm(`1-5반, 1-6반의 ${currentPeriod}교시 결석 데이터를 Google 시트로 동시 전송하시겠습니까?`)) return;

            const btn = document.getElementById('btnSaveAllSheets');
            if (btn) {
                btn.disabled = true;
                btn.innerText = '⌛ 전송 중...';
            }

            const roomStudents = getRoomStudents(currentDay, currentPeriod);
            const targets = ['1-5', '1-6'];
            let successCount = 0;
            let errorCount = 0;

            for (const roomName of targets) {
                const studentsInRoom = roomStudents[roomName];
                if (!studentsInRoom || studentsInRoom.length === 0) continue;

                const attendanceKey = `yajaAttendance1_${currentDay}_${roomName}_P${currentPeriod}`;
                const savedAttendance = JSON.parse(localStorage.getItem(attendanceKey)) || {};

                const attendanceData = {
                    date: new Date().toISOString().split('T')[0],
                    day: currentDay,
                    period: currentPeriod + '교시',
                    room: roomName,
                    supervisor: supervisorName,
                    students: studentsInRoom.map((s) => ({
                        id: s.학번,
                        name: s.이름,
                        // status: false = 결석, true = 출석
                        status: !savedAttendance[s.학번]?.checked,
                        remark: savedAttendance[s.학번]?.remark || ''
                    }))
                };

                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        body: JSON.stringify(attendanceData)
                    });
                    successCount++;
                } catch (error) {
                    console.error('Error saving to sheet for ' + roomName + ':', error);
                    errorCount++;
                }
            }

            if (errorCount > 0) {
                alert(`전송 완료: 성공 ${successCount}건, 실패 ${errorCount}건.\n콘솔 로그를 확인해주세요.`);
            } else if (successCount > 0) {
                alert(`1-5교시, 1-6교시의 ${currentPeriod}교시 데이터 전송이 완료되었습니다! (구글 시트에서 확인해 주세요)`);
            } else {
                alert(`전송할 1-5, 1-6 학생 데이터가 없습니다.`);
            }

            if (btn) {
                btn.disabled = false;
                btn.innerText = '💾 1-5, 1-6 시트 동시 전송';
            }
        }

        renderSeating();
    </script>
</body>
