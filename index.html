<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야자 자리 배치 프로그램</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#118A8E">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            /* 🎨 Modern Teal & Cyan Theme (Travelin Inspired) */
            --primary: #118A8E;
            /* Deep Teal */
            --primary-dark: #0B6E71;
            --secondary: #E0F2F1;
            /* Mint white */

            --bg-canvas: #F5FAFA;
            /* Cool off-white */
            --card-bg: #FFFFFF;

            --text-main: #1D2D2E;
            /* Dark teal-gray */
            --text-sub: #5F7D7E;
            --text-muted: #8FA4A5;

            --border: #D1E5E6;
            /* Soft teal border */
            --border-focus: #118A8E;

            /* Modern Soft Shadows */
            --shadow-sm: 0 2px 12px rgba(17, 138, 142, 0.05);
            --shadow-md: 0 8px 32px rgba(17, 138, 142, 0.12);
            --shadow-lg: 0 16px 48px rgba(17, 138, 142, 0.15);

            --drag-over: #F0FBFA;

            /* Attendance Table Colors */
            --table-header: #F1F9F9;
            --table-border: #E6EEEE;
            --table-row-hover: #F8FCFC;

            /* Room modern colors (Teal based) */
            --room-2-3: #118A8E;
            /* Theme Primary */
            --room-2-4: #4DB6AC;
            /* Teal 300 */
            --room-2-5: #009688;
            /* Teal 500 */
            --room-2-6: #00796B;
            /* Teal 700 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            background-color: var(--bg-canvas);
            background-image:
                radial-gradient(circle at 15% 20%, rgba(17, 138, 142, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(77, 182, 172, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 150, 136, 0.05) 0%, transparent 60%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        header {
            max-width: 1300px;
            margin: 0 auto 40px;
            text-align: center;
            padding: 48px 40px;
            background: linear-gradient(135deg, var(--primary) 0%, #0D6F72 100%);
            border-radius: 36px;
            box-shadow: var(--shadow-md);
            border: none;
            position: relative;
            overflow: hidden;
            color: white;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.04em;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Day and Period Buttons Container to look like a green pill */
        #dayButtons,
        #periodButtons {
            background: var(--primary);
            padding: 6px;
            border-radius: 50px;
            gap: 4px;
            border: none;
            box-shadow: inset 0 2px 6px rgba(11, 110, 113, 0.2);
        }

        /* Turn day/period buttons into segment toggles */
        #dayButtons .day-btn,
        #periodButtons .day-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.85);
            border: none;
            box-shadow: none;
            padding: 10px 20px;
        }

        #dayButtons .day-btn:hover,
        #periodButtons .day-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: none;
            border-color: transparent;
        }

        #dayButtons .day-btn.active,
        #periodButtons .day-btn.active {
            background: white;
            color: var(--primary-dark);
            box-shadow: 0 2px 8px rgba(11, 110, 113, 0.3);
            font-weight: 800;
            border: none;
        }

        .btn {
            padding: 11px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-sub);
            font-size: 0.93rem;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            background: var(--secondary);
            color: var(--primary-dark);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #0D6F72 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 16px rgba(17, 138, 142, 0.25);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #095C5E 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 138, 142, 0.35);
        }

        .btn-danger {
            background: #FFF5F5;
            color: #E07070;
            border: 1.5px solid #F5D0D0;
        }

        .btn-danger:hover {
            background: #FFE8E8;
            color: #C05050;
        }

        /* Default active fallback */
        .day-btn.active {
            background: white;
            color: var(--primary-dark);
            border: none;
            box-shadow: 0 2px 8px rgba(11, 110, 113, 0.3);
        }

        /* Layout Grid */
        .seating-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .classroom-section {
            background: var(--card-bg);
            padding: 36px 40px;
            border-radius: 28px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .classroom-section:hover {
            box-shadow: var(--shadow-md);
        }

        /* little petal deco */
        .classroom-section::after {
            content: '';
            position: absolute;
            bottom: -30px;
            right: -20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(17, 138, 142, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .grid-6x5 {
            display: grid;
            grid-template-columns: 1fr 1fr 40px 1fr 1fr 40px 1fr 1fr;
            row-gap: 14px;
            margin: 28px 0;
        }

        /* 모바일 대응 미디어 쿼리 */
        @media (max-width: 768px) {
            .classroom-section {
                padding: 20px 15px;
                border-radius: 20px;
            }

            .grid-6x5 {
                grid-template-columns: 1fr 1fr 15px 1fr 1fr 15px 1fr 1fr;
                row-gap: 8px;
            }

            .seat {
                border-radius: 12px;
                font-size: 0.75rem;
            }

            .student-id {
                font-size: 0.6rem;
            }

            .student-name {
                font-size: 0.85rem;
                font-weight: 700;
            }

            .room-title {
                font-size: 1.5rem !important;
            }

            .header-left {
                width: 100%;
                margin-bottom: 5px;
            }
        }

        @media (max-width: 480px) {
            .grid-6x5 {
                grid-template-columns: 1fr 1fr 8px 1fr 1fr 8px 1fr 1fr;
                row-gap: 6px;
            }

            .seat {
                border-radius: 8px;
            }
        }

        .seat {
            aspect-ratio: 1 / 1.15;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #FDF4EB 0%, #F8EBE2 100%);
            font-size: 0.85rem;
            position: relative;

            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            box-shadow: 0 2px 8px rgba(180, 100, 80, 0.06);
        }

        .seat:not(.empty):hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 20px rgba(17, 138, 142, 0.2);
            border-color: var(--primary);
            z-index: 10;
        }

        .seat.empty {
            border: 1.5px dashed var(--text-muted);
            background: #FAEFDF;
            box-shadow: none;
            cursor: default;
            opacity: 0.5;
        }

        .seat.present {
            border: 2px solid var(--primary);
            background: linear-gradient(160deg, #E0F2F1 0%, #B2DFDB 100%);
            box-shadow: 0 4px 12px rgba(17, 138, 142, 0.2);
            color: var(--primary-dark);
        }

        .seat.present::after {
            display: none;
        }

        .seat.not-in-period {
            background: #f1f5f9 !important;
            border: 1px dashed #cbd5e1 !important;
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .seat.not-in-period .student-name {
            color: #94a3b8;
        }

        .seat.not-in-period::after {
            content: 'N/A';
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #94a3b8;
        }

        .seat.drag-over {
            background: var(--secondary);
            border-color: var(--primary);
            border-style: solid;
            transform: scale(1.04);
        }

        .teacher-desk {
            width: 55%;
            height: 40px;
            background: #8B6552;
            border: 3px solid #634333;
            border-radius: 8px;
            margin: 20px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            letter-spacing: 0.8em;
            font-size: 1.1rem;
            box-shadow: var(--shadow-sm);
        }

        .student-id {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 2px;
            pointer-events: none;
        }

        .student-name {
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--text-main);
            pointer-events: none;
            letter-spacing: -0.04em;
        }

        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(17, 138, 142, 0.95);
            backdrop-filter: blur(8px);
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 700;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 12px;
            width: fit-content;
            max-width: 90vw;
            white-space: normal;
            word-break: keep-all;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            #toast {
                padding: 12px 20px;
                bottom: 30px;
                font-size: 0.9rem;
            }
        }

        .spacer {
            pointer-events: none;
        }

        /* Info text */
        .info-text {
            font-size: 0.88rem;
            color: var(--text-sub);
            background: rgba(255, 248, 244, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Attendance List */
        .attendance-container {
            max-width: 1000px;
            margin: 0 auto;
            display: none;
            flex-direction: column;
            gap: 36px;
        }

        .attendance-section {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--border);
        }

        .attendance-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 16px;
            font-size: 0.95rem;
        }

        .attendance-table th,
        .attendance-table td {
            padding: 14px 16px;
            text-align: center;
            border-bottom: 1px solid var(--table-border);
        }

        .attendance-table th {
            background-color: var(--table-header);
            font-weight: 700;
            color: var(--text-sub);
        }

        .attendance-table tr:last-child td {
            border-bottom: none;
        }

        .attendance-table tr:hover td {
            background-color: var(--table-row-hover);
        }

        .attendance-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .col-num {
            width: 50px;
        }

        .col-id {
            width: 90px;
        }

        .col-name {
            width: 80px;
        }

        .col-check {
            width: 100px;
            white-space: nowrap;
        }

        .col-remark {
            width: auto;
        }

        .attendance-remark {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #FFFBF8;
            color: var(--text-main);
        }

        .attendance-remark:focus {
            border-color: var(--primary);
            background: white;
            outline: none;
            box-shadow: 0 0 0 3px rgba(17, 138, 142, 0.15);
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--primary);
            padding: 6px;
            border-radius: 50px;
            border: none;
            box-shadow: inset 0 2px 6px rgba(11, 110, 113, 0.2);
        }

        .toggle-btn {
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.85);
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: none;
        }

        .toggle-btn.active {
            background: white;
            color: var(--primary-dark);
            box-shadow: 0 2px 8px rgba(11, 110, 113, 0.3);
            font-weight: 800;
        }

        .gas-config {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        .gas-config input {
            flex: 1;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            background: #FFFBF8;
        }

        .btn-save-sheet {
            margin-top: 20px;
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7DD9C0 0%, #5CC4AB 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(93, 196, 170, 0.3);
        }

        .btn-save-sheet:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .btn-save-sheet:disabled {
            background: #D0C8C2;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Classroom Header */
        .classroom-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .room-title {
            font-size: 2.1rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -0.04em;
            line-height: 1.1;
        }

        .room-notice {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .room-meta {
            font-size: 0.92rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #0D6F72 100%);
            padding: 6px 18px;
            border-radius: 50px;
            letter-spacing: -0.01em;
            white-space: nowrap;
            align-self: flex-start;
            box-shadow: 0 3px 10px rgba(232, 115, 154, 0.3);
        }

        /* Room color top-bar accent */
        .classroom-section[data-room="2-3"] {
            border-top: 5px solid var(--room-2-3);
        }

        .classroom-section[data-room="2-4"] {
            border-top: 5px solid var(--room-2-4);
        }

        .classroom-section[data-room="2-5"] {
            border-top: 5px solid var(--room-2-5);
        }

        .classroom-section[data-room="2-6"] {
            border-top: 5px solid var(--room-2-6);
        }

        .room-title.color-2-3 {
            color: var(--room-2-3);
        }

        .room-title.color-2-4 {
            color: var(--room-2-4);
        }

        .room-title.color-2-5 {
            color: var(--room-2-5);
        }

        .room-title.color-2-6 {
            color: var(--room-2-6);
        }

        .print-title {
            display: none;
        }

        /* Loading Overlay */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid var(--secondary);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #loadingText {
            margin-top: 20px;
            font-weight: 800;
            color: var(--text-main);
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        /* Custom Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(29, 45, 46, 0.6);
            backdrop-filter: blur(5px);
            z-index: 20000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 28px;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-message {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 28px;
            line-height: 1.5;
            word-break: keep-all;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            min-width: 100px;
        }

        .modal-btn-confirm {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(17, 138, 142, 0.3);
        }

        .modal-btn-confirm:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .modal-btn-cancel {
            background: var(--secondary);
            color: var(--primary);
        }

        .modal-btn-cancel:hover {
            background: #D1E5E6;
        }

        /* Print Styles */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            #mainApp {
                display: block !important;
                opacity: 1 !important;
                visibility: visible !important;
            }

            header,
            button,
            .controls,
            .view-toggle,
            #toast,
            .info-text,
            .blossom-container,
            .tree-bg,
            .login-overlay,
            .gas-config {
                display: none !important;
            }

            .seating-container {
                gap: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                display: block !important;
            }

            .classroom-section {
                box-shadow: none !important;
                border-radius: 0 !important;
                margin: 0 !important;
                padding: 8mm !important;
                page-break-after: always !important;
                width: 210mm !important;
                height: 297mm !important;
                box-sizing: border-box !important;
                display: flex !important;
                flex-direction: column !important;
                background: white !important;
                border: none !important;
                overflow: hidden !important;
                transform: none !important;
            }

            .print-title {
                display: block !important;
                font-size: 1.8rem !important;
                font-weight: 800 !important;
                text-align: center !important;
                margin-bottom: 5mm !important;
                color: #000 !important;
                width: 100% !important;
            }

            .classroom-section[data-room="2-3"] {
                border-top: 8px solid #4A90E2 !important;
            }

            .classroom-section[data-room="2-4"] {
                border-top: 8px solid #50E3C2 !important;
            }

<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>야자 감독 교사 로그인</h2>
            <div style="color: var(--text-sub); font-size: 0.95rem; margin-bottom: 10px; word-break: keep-all;">

            </div>
            <input type="text" id="teacherNameInput" placeholder="이름 입력 (예: 홍길동)"

    <div id="customModal" class="modal-overlay">

                <button id="modalConfirm" class="modal-btn modal-btn-confirm">확인</button>
            </div>
        </div>
    </div>

    <div id="mainApp" style="display: none;">

        <header>
            <header>
                <h1>2026학년도 2학년 1학기 자기주도적 학습 자리 배치도 <small
                        style="font-size: 0.6rem; opacity: 0.7; vertical-align: middle;">v21</small></h1>
                <div class="controls">
                    <div class="btn-group" id="dayButtons">
                        <button class="btn day-btn active" data-day="월">월요일</button>
                        <button class="btn day-btn" data-day="화">화요일</button>
                        <button class="btn day-btn" data-day="수">수요일</button>
                        <button class="btn day-btn" data-day="목">목요일</button>
                        <button class="btn day-btn" data-day="금">금요일</button>
                    </div>
                    <div class="btn-group" id="periodButtons"
                        style="background: var(--primary); padding: 4px; border-radius: 50px; gap: 4px; box-shadow: inset 0 2px 6px rgba(11, 110, 113, 0.2);">
                        <button class="btn day-btn active" data-period="1" onclick="selectPeriod(this)">1교시</button>
                        <button class="btn day-btn" data-period="2" onclick="selectPeriod(this)">2교시</button>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="downloadPDF()">📄 저장하기</button>
                        <!-- 배치 및 출석 초기화 버튼 제거됨 (사용자 요청) -->
                    </div>
                    <div class="view-toggle">
                        <button class="toggle-btn active" id="btnSeating" onclick="switchMode('seating')">🪑 자리
                            배치도</button>
                        <button class="toggle-btn" id="btnAttendance" onclick="switchMode('attendance')">📋 출석
                            명단</button>
                    </div>
                    <input type="hidden" id="gasUrl"
                        value="https://script.google.com/macros/s/AKfycbyTNbzVW1DMlAYp6lcrEYKbkR19eRbU-HAazohxuz1HhVg_b6z1QsPFi4A2MgZSMliR/exec">
                    <input type="hidden" id="gasBackupUrl"
                        value="https://script.google.com/macros/s/AKfycbxvmXW2lKnfqYWSW8DiXbucv0KHSn2sxoSClRXJq7qnlPzXkPdytY9b33J6K-SC3UEb/exec">
                    <div class="info-text"
                        style="display: flex; flex-wrap: wrap; justify-content: space-between; width: 100%;">
                        <div style="display: flex; gap: 8px;">
                            <span>💡</span>
                            <span>출석 체크 중 불편한 부분이나 개선할 것들이 있다면 2학년부 박상현T에게 말씀해주세요.</span>
                            <button class="btn"
                                style="padding:4px 12px; font-size:0.8rem; height: 28px; line-height: 1;"
                                onclick="refreshStudentList()">🔄 명단 갱신</button>
                        </div>
                        <div
                            style="font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; margin-left: auto;">
                            👤 <span id="displaySupervisorName"></span> 선생님
                            <button onclick="handleLogout()"
                                style="background: white; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 0.8rem; cursor: pointer; color: var(--text-main); font-weight: 600; box-shadow: var(--shadow-sm); transition: all 0.2s;">로그아웃</button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="seating-container active" id="seatingDisplay"></div>
            <div class="attendance-container" id="attendanceDisplay"></div>
            <div id="toast"><span>✅</span> 배치 정보가 자동 저장되었습니다.</div>
    </div> <!-- Close mainApp -->

    <div id="loadingOverlay">
        <div class="loader"></div>
        <div id="loadingText">출석 정보를 동기화하고 있습니다...</div>
    </div>

    <script>
        let supervisorName = sessionStorage.getItem('yajaSupervisor') || '';
        let allowedTeachers = []; // 구글 시트에서 받아올 동적 명단 (v20)

        function showLoading(text) {
            if (text) document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            showLoading("데이터를 동기화하고 있습니다...");

            // v20: 감독 교사 명단 및 학생 명단을 병렬로 강제 동기화 (최신 데이터 보장)
            const teacherPromise = fetchTeacherList();
            const studentPromise = fetchGlobalData(true); // 강제 캐시 무시

            // 로그인 화면이 떠있는 동안 백그라운드에서 오늘 출결 데이터까지 싹 다 미리 로드 (로딩창 2번 뜨는 현상 방지)
            const attendancePromise = fetchAllTodayAttendance(true);

            await Promise.all([teacherPromise, studentPromise, attendancePromise]);

            if (supervisorName) {
                // 이미 로그인된 세션이 있는 경우 바로 앱 시작 로직 수행
                await startAppSession(supervisorName);
            } else {
                hideLoading(); // 로그인 안된 상태면 즉시 로그인 화면 표시
            }
        });

        async function startAppSession(name) {
            supervisorName = name;
            sessionStorage.setItem('yajaSupervisor', supervisorName);
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displaySupervisorName').innerText = supervisorName;

            // 누락된 출석부가 있는지 확인 (초기 로딩 시 실패했을 경우 대비)
            let needsLoading = false;
            const rooms = ['2-3', '2-4', '2-5', '2-6'];
            const dMap = ['일', '월', '화', '수', '목', '금', '토'];
            const actualToday = dMap[new Date().getDay()];

            if (actualToday !== '일' && actualToday !== '토') {
                const dateStr = getTodayDateString();
                for (const p of ['1', '2']) {
                    for (const r of rooms) {
                        if (!sessionStorage.getItem(`synced_${dateStr}_${actualToday}_${p}_${r}`)) {
                            needsLoading = true;
                        }
                    }
                }
            }

            if (needsLoading) {
                showLoading("누락된 출결 데이터를 마저 불러오고 있습니다...");
                await fetchAllTodayAttendance(true);
            }

            renderSeating();
            hideLoading();
        }

        async function handleLogin() {
            const nameInput = document.getElementById('teacherNameInput').value.trim();

            if (!nameInput) {
                showAlert('감독 교사 성함을 입력해주세요.');
                return;
            }

            // v20: 서버에서 받아온 명단이 아직 없다면 다시 시도
            if (allowedTeachers.length === 0) {
                await fetchTeacherList();
            }

            if (!allowedTeachers.includes(nameInput)) {
                showAlert('등록되지 않은 선생님입니다. 입력하신 성함을 다시 한 번 확인해주세요.');
                return;
            }

            // 로그인 시점에도 명단이 최신인지 한 번 더 확인 (캐시 사용 가능)
            showLoading("명단 확인 중...");
            const success = await fetchGlobalData();
            if (!success) {
                hideLoading();
                showAlert('구글 시트에서 학생 명단을 가져오는 데 실패했습니다.');
                return;
            }

            await startAppSession(nameInput);
        }

        /**
         * v20: 구글 시트 '감독교사명단' 탭에서 성함을 실시간으로 불러옵니다.
         */
        async function fetchTeacherList() {
            const gasUrl = document.getElementById('gasUrl').value.trim();
            if (!gasUrl) return;

            try {
                const response = await fetch(`${gasUrl}?action=getTeachers`);
                const names = await response.json();
                if (Array.isArray(names)) {
                    allowedTeachers = names;
                    console.log("감독 교사 명단 로드 완료:", allowedTeachers.length, "명");
                }
            } catch (e) {
                console.error("Fetch teachers error:", e);
                // 실패 시 최소한의 폴백(개발자/관리자 등)을 둘 수 있으나, 
                // 여기서는 시트 데이터가 핵심이므로 경고만 표시
            }
        }

        async function handleLogout() {
            showConfirm('로그아웃 하시겠습니까?', () => {
                sessionStorage.removeItem('yajaSupervisor');
                // 로그아웃 시 보안을 위해 학생 명단 캐시도 삭제할 수 있지만, 
                // 속도를 위해 남겨두는 편이 좋습니다. (필요 시 아래 주석 해제)
                // localStorage.removeItem('yajaStudentList');
                supervisorName = '';
                document.getElementById('teacherNameInput').value = '';
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            });
        }

        async function refreshStudentList() {
            showLoading();
            const success = await fetchGlobalData(true); // 강제 새로고침
            hideLoading();
            if (success) {
                showToast("학생 명단이 성공적으로 갱신되었습니다.");
                if (currentMode === 'seating') renderSeating();
                else renderAttendance();
            } else {
                showAlert("명단 갱신에 실패했습니다. 인터넷 연결을 확인해주세요.");
            }
        }
        // 시트 데이터 캐싱 로직
        let globalData = [];

        async function fetchGlobalData(force = false) {
            // 강제 갱신이 아니고 캐시가 존재하면 캐시 데이터 사용 (속도 향상)
            if (!force) {
                const cached = localStorage.getItem('yajaStudentList');
                if (cached) {
                    try {
                        globalData = JSON.parse(cached);
                        if (Array.isArray(globalData) && globalData.length > 0) {
                            console.log("캐시된 학생 명단 로드 완료:", globalData.length, "명");
                            return true;
                        }
                    } catch (e) {
                        localStorage.removeItem('yajaStudentList');
                    }
                }
            }

            const gasUrl = document.getElementById('gasUrl').value.trim();
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                const response = await fetch(`${gasUrl}?action=getStudents`, { signal: controller.signal });
                clearTimeout(timeoutId);

                const data = await response.json();
                if (Array.isArray(data)) {
                    if (data.length === 0) {
                        console.warn("서버에서 빈 명단을 반환했습니다.");
                        return false;
                    }

                    globalData = data.map(s => {
                        const obj = {};
                        for (let key in s) {
                            // 제목(key)과 내용 모두 trim 처리하여 공백으로 인한 매칭 오류 방지
                            const cleanKey = String(key).trim();
                            obj[cleanKey] = (s[key] === null || s[key] === undefined) ? "" : String(s[key]).trim();
                        }
                        return obj;
                    });

                    localStorage.setItem('yajaStudentList', JSON.stringify(globalData));
                    console.log("학생 명단 서버 로드 완료:", globalData.length, "명");

                    return true;
                }
            } catch (e) {
                console.error("Fetch students error:", e);
                if (!localStorage.getItem('yajaStudentList')) {
                    showAlert("서버에서 학생 명단을 가져오는 데 실패했습니다.");
                }
            }
            return false;
        }

        // 오늘 요일 자동 감지 및 초기값 설정
        const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
        const todayIdx = new Date().getDay();
        const initialDay = (todayIdx >= 1 && todayIdx <= 5) ? daysMap[todayIdx] : '월';

        let currentDay = initialDay;
        let currentMode = 'seating';
        let currentPeriod = '1';

        function selectPeriod(btn) {
            document.querySelectorAll('#periodButtons [data-period]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPeriod = btn.dataset.period;

            // 교시가 바뀌면 자리 배치도와 출석부 모두 갱신
            if (currentMode === 'seating') renderSeating();
            else renderAttendance();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btnSeating').classList.toggle('active', mode === 'seating');
            document.getElementById('btnAttendance').classList.toggle('active', mode === 'attendance');

            const seatingDisp = document.getElementById('seatingDisplay');
            const attendanceDisp = document.getElementById('attendanceDisplay');

            if (mode === 'seating') {
                seatingDisp.style.display = 'flex';
                seatingDisp.classList.add('active');
                attendanceDisp.style.display = 'none';
                attendanceDisp.classList.remove('active');
                // 초기화 버튼들이 제거되었으므로 display 토글 코드 생략
                renderSeating();
            } else {
                seatingDisp.style.display = 'none';
                seatingDisp.classList.remove('active');
                attendanceDisp.style.display = 'flex';
                attendanceDisp.classList.add('active');
                // 초기화 버튼들이 제거되었으므로 display 토글 코드 생략
                renderAttendance();
            }
        }

        document.querySelectorAll('#dayButtons .day-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#dayButtons .day-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDay = btn.dataset.day;
                if (currentMode === 'seating') renderSeating();
                else renderAttendance();
            });
        });

        function getRoomStudents(day) {
            const col1 = `${day}1`;
            const col2 = `${day}2`;
            const col3 = `${day}3`; // 3교시 지원 추가
            const overrideCol = `${day}_배정`;

            // 1. 방 리스트 초기화
            const roomLists = { '2-3': [], '2-4': [], '2-5': [], '2-6': [] };
            const unassignedStudents = [];

            // 2. 수동 배정(Override) 우선 처리
            globalData.forEach(s => {
                const manualRoom = s[overrideCol];
                if (manualRoom && roomLists[manualRoom]) {
                    roomLists[manualRoom].push(s);
                } else {
                    // 수동 배정이 없는 경우, 1/2/3교시 중 하나라도 참여하는 학생만 미배정 목록에 추가
                    if (s[col1] === '1' || s[col2] === '1' || s[col3] === '1') {
                        unassignedStudents.push(s);
                    }
                }
            });

            // 3. 미배정 학생들을 참여 시간(P1/P2/Both)에 따라 기본 그룹화
            // (Both 기준은 P1과 P2 참여 여부로 판단하며, P3는 자동 배치 대상에 포함만 시킴)
            let bothP = unassignedStudents.filter(s => s[col1] === '1' && s[col2] === '1').sort((a, b) => Number(a.순번) - Number(b.순번));
            let p1Only = unassignedStudents.filter(s => s[col1] === '1' && s[col2] !== '1').sort((a, b) => Number(a.순번) - Number(b.순번));
            let p2Only = unassignedStudents.filter(s => s[col1] !== '1' && (s[col2] === '1' || s[col3] === '1')).sort((a, b) => Number(a.순번) - Number(b.순번));

            // 4. 일반 자동 배정 (피리오드에 따라 반 할당)
            roomLists['2-5'].push(...p1Only);
            roomLists['2-6'].push(...p2Only);

            // 5. 양쪽 시간대(bothP) 학생들을 2-3, 2-4반에 균등 분할
            const half = Math.ceil(bothP.length / 2);
            roomLists['2-3'].push(...bothP.slice(0, half));
            roomLists['2-4'].push(...bothP.slice(half));

            // 6. 모든 방 명단 학번 순 정렬 마무리
            Object.keys(roomLists).forEach(room => {
                roomLists[room].sort((a, b) => Number(a.순번) - Number(b.순번));
            });

            return roomLists;
        }

        async function saveRoomAttendanceToSheet(roomName) {
            const gasUrl = document.getElementById('gasUrl').value.trim();
            if (!gasUrl) return;

            // 실제 오늘 요일 확인 (동기화 제한용)
            const dMap = ['일', '월', '화', '수', '목', '금', '토'];
            const actualToday = dMap[new Date().getDay()];

            if (currentDay !== actualToday) {
                showAlert(`${actualToday}요일 데이터만 시트 전송이 가능합니다.\n현재 선택된 요일(${currentDay}요일)은 전송할 수 없습니다.`);
                return;
            }

            const roomStudents = getRoomStudents(currentDay)[roomName];
            const activeStudents = roomStudents.filter(s => s[`${currentDay}${currentPeriod}`] === '1');

            if (activeStudents.length === 0) {
                showAlert(`${roomName}반에 ${currentPeriod}교시 참여 학생이 없습니다.`);
                return;
            }

            const studentsData = activeStudents.map(s => {
                const attKey = `att_${currentDay}_${currentPeriod}_${s.학번}`;
                const isPresent = sessionStorage.getItem(attKey) === 'true';
                const remark = sessionStorage.getItem(`rem_${currentDay}_${currentPeriod}_${s.학번}`) || "";
                return {
                    id: s.학번,
                    name: s.이름,
                    status: isPresent,
                    remark: remark
                };
            });

            const payload = {
                type: "bulk",
                date: getTodayDateString(),
                day: currentDay,
                period: currentPeriod + '교시',
                room: roomName, // 구글 시트 날짜 자동 변환 방지용 작은따옴표 추가
                supervisor: (typeof supervisorName !== 'undefined' && supervisorName) ? supervisorName : "선생님",
                students: studentsData
            };

            showLoading();
            try {
                await fetch(gasUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                const dateStr = getTodayDateString();
                sessionStorage.setItem(`synced_${dateStr}_${currentDay}_${currentPeriod}_${roomName}`, 'true');

                showAlert(`${roomName}반 ${activeStudents.length}명의 출결 정보가 시트로 전송되었습니다.`);
            } catch (e) {
                console.error(e);
                showAlert("전송 중 오류가 발생했습니다. 인터넷 연결을 확인해주세요.");
            } finally {
                hideLoading();
            }
        }

        function renderSeating() {
            const display = document.getElementById('seatingDisplay');
            display.innerHTML = '';

            if (!globalData || globalData.length === 0) {
                display.innerHTML = `<div class="info-text" style="text-align:center; padding:80px 20px; width:100%; border:2px dashed var(--border); border-radius:30px;">
                    현재 불러온 학생 명단이 없습니다.<br>상단 [🔄 명단 갱신] 버튼을 눌러 데이터를 불러와주세요.
                </div>`;
                return;
            }

            const roomStudents = getRoomStudents(currentDay);
            const rooms = ['2-3', '2-4', '2-5', '2-6'];

            let totalFetched = 0;
            rooms.forEach(r => totalFetched += roomStudents[r].length);

            if (totalFetched === 0) {
                display.innerHTML = `<div class="info-text" style="text-align:center; padding:80px 20px; width:100%; border:2px dashed var(--border); border-radius:30px;">
                    <span style="font-size:1.2rem; font-weight:700; color:var(--primary-dark);">${currentDay}요일에 배정된 학생이 없습니다.</span><br><br>
                    <span style="color:var(--text-sub); display:block; margin-top:10px;">
                        💡 <b>도움말</b><br>
                        1. 구글 시트의 [${currentDay}1], [${currentDay}2], [${currentDay}3] 컬럼에 숫자 '1'이 입력되어 있나요?<br>
                        2. 시트의 데이터가 [학생명단] 탭에 위치하고 있나요?
                    </span>
                </div>`;
                return;
            }

            // 실제 오늘 요일 확인 (동기화 제한용)
            const dMap = ['일', '월', '화', '수', '목', '금', '토'];
            const actualToday = dMap[new Date().getDay()];

            rooms.forEach(roomName => {
                const students = roomStudents[roomName];
                if (students.length === 0) return;

                const storageKey = `yajaArrangement_${currentDay}_${roomName}`;
                let savedIds = JSON.parse(localStorage.getItem(storageKey));
                let gridSeats = new Array(30).fill(null);
                const currentStudentMap = {};
                students.forEach(s => currentStudentMap[s.학번] = s);

                if (savedIds) {
                    savedIds.forEach((id, idx) => {
                        if (id && currentStudentMap[id]) {
                            gridSeats[idx] = currentStudentMap[id];
                            delete currentStudentMap[id];
                        }
                    });
                    fillZigzag(gridSeats, Object.values(currentStudentMap).sort((a, b) => Number(a.순번) - Number(b.순번)));
                } else {
                    fillZigzag(gridSeats, students);
                }
                saveArrangement(roomName, gridSeats);

                const section = document.createElement('div');
                section.className = 'classroom-section';
                section.setAttribute('data-room', roomName);
                const roomColorClass = 'color-' + roomName;

                const studentsInPeriod = students.filter(s => s[`${currentDay}${currentPeriod}`] === '1');

                section.innerHTML = `
                    <div class="print-title">2학년 자기주도적 학습 자리 배치표</div>
                    <div class="classroom-header" style="flex-wrap: wrap; gap: 12px;">
                        <div class="header-left">
                            <span class="room-title ${roomColorClass}">${roomName}반</span>
                        </div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <button class="btn btn-primary" onclick="saveRoomAttendanceToSheet('${roomName}')" style="padding:6px 16px; font-size:0.85rem;">💾 시트 전송</button>
                            <span class="room-meta">${currentDay}요일 | ${currentPeriod}교시 | ${studentsInPeriod.length}명</span>
                        </div>
                    </div>
                    <div class="grid-6x5"></div>
                    <div class="teacher-desk">교탁</div>
                `;

                const dateStr = getTodayDateString();
                const syncCacheKey = `synced_${dateStr}_${currentDay}_${currentPeriod}_${roomName}`;
                if (!sessionStorage.getItem(syncCacheKey)) {
                    // 렌더링 시에는 항상 silent 옵션을 주어 로딩창이 뜨지 않게 함
                    fetchAttendanceFromSheet(roomName, { silent: true });
                }

                const grid = section.querySelector('.grid-6x5');
                gridSeats.forEach((student, i) => {
                    const col = i % 6;
                    if (col === 2 || col === 4) grid.appendChild(Object.assign(document.createElement('div'), { className: 'spacer' }));

                    const seat = document.createElement('div');
                    seat.className = 'seat';
                    seat.setAttribute('data-index', i);

                    if (!student) {
                        seat.classList.add('empty');
                    } else {
                        const isStudentInPeriod = student[`${currentDay}${currentPeriod}`] === '1';
                        if (!isStudentInPeriod) {
                            seat.classList.add('not-in-period');
                            seat.innerHTML = `<div class="student-id">${student.학번}</div><div class="student-name">${student.이름}</div>`;
                        } else {
                            const attKey = `att_${currentDay}_${currentPeriod}_${student.학번}`;
                            const isPresent = sessionStorage.getItem(attKey) === 'true';
                            if (isPresent) seat.classList.add('present');

                            seat.innerHTML = `<div class="student-id">${student.학번}</div><div class="student-name">${student.이름}</div>`;
                            seat.setAttribute('draggable', 'true');

                            seat.onclick = () => {
                                const nowPresent = sessionStorage.getItem(attKey) === 'true';
                                sessionStorage.setItem(attKey, !nowPresent);
                                seat.classList.toggle('present', !nowPresent);
                            };

                            seat.addEventListener('dragstart', handleDragStart);
                        }
                    }
                    seat.addEventListener('dragover', handleDragOver);
                    seat.addEventListener('dragleave', handleDragLeave);
                    seat.addEventListener('drop', handleDrop);
                    grid.appendChild(seat);
                });
                display.appendChild(section);
            });
        }

        function fillZigzag(grid, students) {
            let sIdx = 0;
            for (let row = 4; row >= 0; row--) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    if (!grid[idx] && (row + col) % 2 === 0 && sIdx < students.length) grid[idx] = students[sIdx++];
                }
            }
            if (sIdx < students.length) {
                for (let row = 4; row >= 0; row--) {
                    for (let col = 0; col < 6; col++) {
                        const idx = row * 6 + col;
                        if (!grid[idx] && sIdx < students.length) grid[idx] = students[sIdx++];
                    }
                }
            }
        }

        let draggedElement = null;
        function handleDragStart(e) { draggedElement = this; e.dataTransfer.setData('text/plain', this.dataset.index); this.style.opacity = '0.4'; }
        function handleDragOver(e) { e.preventDefault(); this.classList.add('drag-over'); }
        function handleDragLeave() { this.classList.remove('drag-over'); }
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (draggedElement) draggedElement.style.opacity = '1';
            const sIdx = parseInt(e.dataTransfer.getData('text/plain'));
            const tIdx = parseInt(this.dataset.index);
            const sRoom = draggedElement.parentElement.parentElement.dataset.room;
            const tRoom = this.parentElement.parentElement.dataset.room;
            if (sRoom !== tRoom || sIdx === tIdx) return;
            const k = `yajaArrangement_${currentDay}_${sRoom}`;
            let arr = JSON.parse(localStorage.getItem(k));
            [arr[sIdx], arr[tIdx]] = [arr[tIdx], arr[sIdx]];
            localStorage.setItem(k, JSON.stringify(arr));
            showToast();
            renderSeating();
        }
        function saveArrangement(roomName, grid) {
            const dateStr = getTodayDateString();
            localStorage.setItem(`yajaArrangement_${currentDay}_${roomName}`, JSON.stringify(grid.map(s => s ? s.학번 : "")));
        }
        function showToast(msg = '배치가 저장되었습니다.') {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<span>✅</span> <span>${msg}</span>`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        function resetArrangement() {
            showConfirm('현재 요일의 모든 배치를 초기화하시겠습니까?', () => {
                Object.keys(localStorage).filter(k => k.startsWith(`yajaArrangement_${currentDay}_`)).forEach(k => localStorage.removeItem(k));
                showToast('배치가 초기화되었습니다.');
                renderSeating();
            });
        }
        function resetAttendance() {
            showConfirm(`현재 요일(${currentDay}요일)의 출석 체크 내역을 모두 초기화하시겠습니까?`, () => {
                Object.keys(sessionStorage).filter(k => k.startsWith(`att_${currentDay}_`) || k.startsWith(`rem_${currentDay}_`)).forEach(k => sessionStorage.removeItem(k));
                showToast('출석 데이터가 초기화되었습니다.');
                renderAttendance();
            });
        }

        const loadingMessages = [
            "선생님, 오늘 하루도 고생 많으셨습니다! ☕",
            "학생들 출석 현황을 꼼꼼하게 확인하고 있어요! 🕵️‍♂️",
            "구글 시트와 열심히 요정들이 소통하는 중입니다... 📡",
            "잠시만요! 최신 야자 명단을 준비하고 있습니다 ⏳",
            "야자 감독 화이팅! 데이터를 안전하게 가져오고 있어요 🚀",
            "출석부가 곧 도착합니다. 잠시만 기다려주세요! 📬"
        ];

        function showLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                const randomMsg = loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
                document.getElementById('loadingText').innerText = randomMsg;
                overlay.style.display = 'flex';
            }
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.style.display = 'none';

        function showAlert(msg) {

            document.getElementById('modalMessage').innerText = msg;
            document.getElementById('modalCancel').style.display = 'none';
            const confirmBtn = document.getElementById('modalConfirm');
            confirmBtn.onclick = () => { modal.style.display = 'none'; };
            modal.style.display = 'flex';
        }

        function showConfirm(msg, onConfirm) {
            const modal = document.getElementById('customModal');
            document.getElementById('modalMessage').innerText = msg;
            document.getElementById('modalCancel').style.display = 'block';
            document.getElementById('modalCancel').onclick = () => { modal.style.display = 'none'; };
            const confirmBtn = document.getElementById('modalConfirm');
            confirmBtn.onclick = () => {

                if (onConfirm) onConfirm();
            };
            modal.style.display = 'flex';
        }

        function getTodayDateString() {
            // "2026. 3. 19." 형식으로 통일 (끝에 점 포함)
            const d = new Date();
            return `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}.`;
        }

        const fetchingRooms = new Set();
        /**
         * 시트에서 출석 데이터를 가져오는 함수
         * @param {string} roomName - 반 이름
         * @param {Object} options - { silent: 로딩창 숨김 여부, day: 명시적 요일, period: 명시적 교시 }
         */
        async function fetchAttendanceFromSheet(roomName, options = {}) {
            const { silent = false, day = currentDay, period = currentPeriod } = options;
            const gasUrl = document.getElementById('gasUrl').value.trim();
            if (!gasUrl) return;

            // 이미 요쳥 중인 '동일 요일/교시/반' 조합은 중복 실행 방지
            const dateStr = getTodayDateString();
            const fetchId = `${dateStr}_${day}_${period}_${roomName}`;
            if (fetchingRooms.has(fetchId)) return;

            const cacheKey = `synced_${fetchId}`;
            if (sessionStorage.getItem(cacheKey)) return;

            fetchingRooms.add(fetchId);
            if (!silent) showLoading();

            try {
                const url = `${gasUrl}${gasUrl.includes('?') ? '&' : '?'}date=${encodeURIComponent(dateStr)}&day=${encodeURIComponent(day)}&period=${encodeURIComponent(period + '교시')}&room=${encodeURIComponent(roomName)}`;

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                const results = await response.json();

                if (results && typeof results === 'object') {
                    Object.keys(results).forEach(studentId => {
                        const data = results[studentId];
                        sessionStorage.setItem(`att_${day}_${period}_${studentId}`, data.status);
                        sessionStorage.setItem(`rem_${day}_${period}_${studentId}`, data.remark || "");
                    });
                    sessionStorage.setItem(cacheKey, 'true');

                    // 현재 보고 있는 화면과 데이터가 일치하면 UI 갱신 (단, 무한 루프 주의)
                    if (currentDay === day && currentPeriod === period) {
                        if (currentMode === 'seating') renderSeating();
                        else renderAttendance();
                    }
                }
            } catch (error) {
                console.error('Fetch error:', error);
            } finally {
                fetchingRooms.delete(fetchId);
                if (!silent && fetchingRooms.size === 0) {
                    hideLoading();
                }
            }
        }

        // 실제 오늘 날짜(현지 시간 기준)의 모든 반/모든 교시 데이터를 한꺼번에 로드 (모달)
        async function fetchAllTodayAttendance(silent = false) {
            const rooms = ['2-3', '2-4', '2-5', '2-6'];
            const periods = ['1', '2'];

            // 실제 오늘 요일 감지
            const dMap = ['일', '월', '화', '수', '목', '금', '토'];
            const actualToday = dMap[new Date().getDay()];
            if (actualToday === '일' || actualToday === '토') return;

            if (!silent) showLoading("데이터를 빠르게 동기화하는 중입니다..."); // 모든 데이터 로드 시 로딩창 표시

            try {
                // v19 개선: 병렬 실행(Promise.all)으로 속도 대폭 향상 (기존 10초+ -> 약 2초)
                const fetchPromises = [];
                for (const p of periods) {
                    for (const r of rooms) {
                        fetchPromises.push(fetchAttendanceFromSheet(r, { silent: true, day: actualToday, period: p }));
                    }
                }
                await Promise.all(fetchPromises);
            } catch (error) {
                console.error("전체 동기화 중 일부 오류 발생:", error);
            } finally {
                if (!silent) hideLoading();
            }
        }


        function renderAttendance() {
            const display = document.getElementById('attendanceDisplay');
            display.innerHTML = '';

            // 데이터가 아예 없는 경우
            if (!globalData || globalData.length === 0) {
                display.innerHTML = `<div class="info-text" style="text-align:center; padding:80px 20px; width:100%; border:2px dashed var(--border); border-radius:30px;">
                    현재 불러온 학생 명단이 없습니다.<br>상단 [🔄 명단 갱신] 버튼을 눌러 데이터를 불러와주세요.
                </div>`;
                return;
            }

            const roomStudents = getRoomStudents(currentDay);
            const rooms = ['2-3', '2-4', '2-5', '2-6'];

            // 현재 실제 요일 계산
            const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
            const todayIndex = new Date().getDay();
            const actualToday = daysMap[todayIndex];
            const isToday = currentDay === actualToday;

            // 해당 교시에 한 명도 없는지 확인
            let totalInPeriod = 0;
            rooms.forEach(rn => {
                totalInPeriod += roomStudents[rn].filter(s => s[`${currentDay}${currentPeriod}`] === '1').length;
            });

            if (totalInPeriod === 0) {
                // 교시 선택 UI만 먼저 표시
                const ps = document.createElement('div');
                ps.id = 'periodButtons';
                ps.style.cssText = 'display:flex;gap:4px;margin-bottom:20px;justify-content:center;width:fit-content;margin-left:auto;margin-right:auto;';
                ps.innerHTML = `
                    <button class="btn day-btn ${currentPeriod === '1' ? 'active' : ''}" data-period="1" onclick="selectPeriod(this)">1교시</button>
                    <button class="btn day-btn ${currentPeriod === '2' ? 'active' : ''}" data-period="2" onclick="selectPeriod(this)">2교시</button>
                `;
                display.appendChild(ps);

                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'info-text';
                emptyMsg.style.cssText = 'text-align:center; padding:80px 20px; width:100%; border:2px dashed var(--border); border-radius:30px;';
                emptyMsg.innerHTML = `<span style="font-size:1.2rem; font-weight:700; color:var(--primary-dark);">${currentDay}요일 ${currentPeriod}교시에 배정된 학생이 없습니다.</span>`;
                display.appendChild(emptyMsg);
                return;
            }

            // 교시 선택 UI
            const periodSelector = document.createElement('div');
            periodSelector.id = 'periodButtons';
            periodSelector.style.cssText = 'display:flex;gap:4px;margin-bottom:20px;justify-content:center;width:fit-content;margin-left:auto;margin-right:auto;';
            periodSelector.innerHTML = `
                <button class="btn day-btn ${currentPeriod === '1' ? 'active' : ''}" data-period="1" onclick="selectPeriod(this)">1교시</button>
                <button class="btn day-btn ${currentPeriod === '2' ? 'active' : ''}" data-period="2" onclick="selectPeriod(this)">2교시</button>
            `;
            display.appendChild(periodSelector);


            rooms.forEach(roomName => {
                const students = roomStudents[roomName].filter(s => s[`${currentDay}${currentPeriod}`] === '1');
                if (students.length === 0) return;

                // 해당 반의 데이터를 서버에서 아직 안 불러왔다면 백그라운드에서 불러오기 시작 (로딩창 없이)
                const dateStr = getTodayDateString();
                const cacheKey = `synced_${dateStr}_${currentDay}_${currentPeriod}_${roomName}`;
                if (!sessionStorage.getItem(cacheKey)) {
                    fetchAttendanceFromSheet(roomName, { silent: true });
                }

                const section = document.createElement('div');
                section.className = 'attendance-section';
                section.innerHTML = `
                    <div class="classroom-header" style="flex-wrap: wrap; gap: 12px;">
                        <span class="room-title" style="word-break: keep-all; font-size: clamp(1.6rem, 5vw, 2.1rem); line-height: 1.2;">${roomName}반 출석부 (${currentPeriod}교시)</span>
                        <div style="display:flex; gap:10px; align-items:center; flex-wrap: wrap; width: 100%; justify-content: flex-start; margin-top: 5px;">
                            <button class="btn" style="padding:6px 14px; font-size:0.85rem;" onclick="sessionStorage.removeItem('${cacheKey}'); fetchAttendanceFromSheet('${roomName}')">🔄 명단 갱신</button>
                            <span class="room-meta">${currentDay}요일 | 총 ${students.length}명</span>
                        </div>
                    </div>
                    <div class="table-responsive" style="overflow-x: auto; margin-top: 15px;">
                        <table class="attendance-table">
                            <thead>
                                <tr>
                                    <th class="col-num">번호</th>
                                    <th class="col-id">학번</th>
                                    <th class="col-name">이름</th>
                                    <th class="col-check">출석여부</th>
                                    <th class="col-remark">비고</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${students.map((s, idx) => {
                    const stateKey = `att_${currentDay}_${currentPeriod}_${s.학번}`;
                    const remarkKey = `rem_${currentDay}_${currentPeriod}_${s.학번}`;
                    const isChecked = sessionStorage.getItem(stateKey) === 'true';
                    const remarkValue = sessionStorage.getItem(remarkKey) || '';
                    return `
                                    <tr style="color: var(--text-main); ${!isToday ? 'opacity: 0.6; background-color: #f8fafc;' : ''}">
                                        <td style="color: var(--text-main);">${idx + 1}</td>
                                        <td style="color: var(--text-muted);">${s.학번}</td>
                                        <td style="font-weight: 800; color: var(--text-main); font-size: 1.05rem;">${s.이름}</td>
                                        <td><input type="checkbox" class="attendance-checkbox" data-id="${s.학번}" ${isChecked ? 'checked' : ''} ${!isToday ? 'disabled' : ''} onchange="sessionStorage.setItem('${stateKey}', this.checked)"></td>
                                        <td><input type="text" class="attendance-remark" data-id="${s.학번}" value="${remarkValue}" placeholder="비고 입력" ${!isToday ? 'disabled' : ''} onchange="sessionStorage.setItem('${remarkKey}', this.value)"></td>
                                    </tr>
                                    `;
                }).join('')}
                            </tbody>
                        </table>
                    </div>
                    ${!isToday ? `<div style="color: #ef4444; font-size: 0.9rem; margin-top: 15px; text-align: center; font-weight: 600;">⚠️ 오늘은 ${actualToday}요일입니다. ${currentDay}요일 출석체크는 불가능합니다.</div>` : ''}
                    <button class="btn-save-sheet" onclick="saveAttendanceToSheet('${roomName}', this)" ${!isToday ? 'disabled style="background: #9ca3af; cursor: not-allowed;"' : ''}>💾 ${currentPeriod}교시 ${roomName}반 전체 동기화/저장</button>
                `;
                display.appendChild(section);
            });
        }

        async function saveAttendanceToSheet(roomName, btn) {
            // 이중 안전 장치: 다시 한번 현재 요일 확인
            const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
            const actualToday = daysMap[new Date().getDay()];
            if (currentDay !== actualToday) {
                showAlert(`오늘은 ${actualToday}요일입니다. ${currentDay}요일 출석체크는 불가능합니다.`);
                return;
            }

            const gasUrl = document.getElementById('gasUrl').value.trim();
            const gasBackupInput = document.getElementById('gasBackupUrl');
            const gasBackupUrl = gasBackupInput ? gasBackupInput.value.trim() : '';

            if (!gasUrl) {
                showAlert('먼저 Google Apps Script URL을 입력해주세요.');
                return;
            }

            showConfirm(`${roomName}반 출석 데이터를 Google 시트로 전송하시겠습니까?`, async () => {

                const roomStudents = getRoomStudents(currentDay)[roomName].filter(s => s[`${currentDay}${currentPeriod}`] === '1');
                const section = btn.closest('.attendance-section');
                const checkboxes = section.querySelectorAll('.attendance-checkbox');

                const attendanceData = {
                    date: getTodayDateString(),
                    day: currentDay,
                    period: currentPeriod + '교시',
                    room: roomName, // 구글 시트 날짜 자동 변환 방지용 작은따옴표 추가
                    supervisor: supervisorName, // 감독 교사 데이터 추가
                    students: roomStudents.map((s, idx) => {
                        const checkbox = section.querySelector(`.attendance-checkbox[data-id="${s.학번}"]`);
                        const remarkInput = section.querySelector(`.attendance-remark[data-id="${s.학번}"]`);
                        return {
                            id: s.학번,
                            name: s.이름,
                            status: checkbox ? checkbox.checked : false,
                            remark: remarkInput ? remarkInput.value : ""
                        };
                    })
                };

                const originalText = btn.innerText;
                btn.disabled = true;
                btn.innerText = '⌛ 전송 중...';

                try {
                    const requests = [];

                    // 메인 시트 전송 요청
                    requests.push(
                        fetch(gasUrl, {
                            method: 'POST',
                            mode: 'no-cors', // GAS web apps often require no-cors for simple requests from different origins
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(attendanceData)
                        })
                    );

                    // 백업 시트 전송 요청 (URL이 올바르게 설정된 경우)
                    if (gasBackupUrl && gasBackupUrl !== "여기에_백업용_앱스스크립트_URL_입력") {
                        requests.push(
                            fetch(gasBackupUrl, {
                                method: 'POST',
                                mode: 'no-cors',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify(attendanceData)
                            })
                        );
                    }

                    await Promise.all(requests);

                    // Note: with no-cors, we won't be able to read the response object, but we can assume success if no error is thrown
                    showAlert(`${roomName}반 데이터 전송 완료! (구글 시트에서 확인해 주세요)`);
                } catch (error) {
                    console.error('Error saving to sheet:', error);
                    showAlert('전송 중 오류가 발생했습니다. 콘솔 로그를 확인해 주세요.');
                } finally {
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            });
        }

        // 요일 버튼 초기 활성화
        const activeBtn = document.querySelector(`.day-btn[data-day="${currentDay}"]`);
        if (activeBtn) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        // Removed createPetals to match the new minimalist theme
        // function createPetals() { ... }


        async function downloadPDF() {
            const element = document.getElementById('seatingDisplay');
            if (!element || element.innerHTML.trim() === "") {
                showAlert("저장할 자리 배치도 데이터가 없습니다.");
                return;
            }

            const opt = {
                margin: 0,
                filename: `야자배치도_${currentDay}_${currentPeriod}교시.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: {
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    letterRendering: true
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };

            showLoading();
            const exportDataDay = currentDay;
            document.body.classList.add('is-exporting-pdf');
            document.body.classList.add(`is-exporting-pdf-${exportDataDay}`);

            try {
                // html2pdf는 전역 객체로 로드됨
                await html2pdf().set(opt).from(element).save();
            } catch (error) {
                console.error("PDF Export Error:", error);
                showAlert("PDF 저장 중 오류가 발생했습니다.");
            } finally {
                document.body.classList.remove('is-exporting-pdf');
                document.body.classList.remove(`is-exporting-pdf-${exportDataDay}`);
                hideLoading();
            }
        }

        renderSeating();
    </script>
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('Service Worker registered!', reg);
                        // 새로운 서비스 워커가 업데이트되었을 때 자동 새로고침
                        reg.onupdatefound = () => {
                            const newWorker = reg.installing;
                            newWorker.onstatechange = () => {
                                if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                                    // location.reload(); // 중복 새로고침 현상(더블 로딩) 방지를 위해 제거 (아래 controllerchange에서 1회만 처리)
                                }
                            };
                        };
                    })
                    .catch(err => console.log('Service Worker registration failed:', err));
            });

            // 제어권이 변경되었을 때(새로운 SW 활성화 시) 새로고침
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    window.location.reload();
                }
            });
        }
    </script>
</body>

</html>
