<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야자 자리 배치 프로그램</title>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            /* 🌸 Spring Pastel Theme (Softened Contrast) */
            --primary: #E8739A;
            /* Rose Pink */
            --primary-dark: #C9557F;
            --secondary: #FDEAF1;
            /* slightly warmer blush */

            --bg-canvas: #FAF1E8;
            /* Darker, less blinding cream */
            --card-bg: #FCF5EF;
            /* Softened white-peach */

            --text-main: #2D1E16;
            /* Deeper warm brown */
            --text-sub: #8B6552;
            /* Darker, high-contrast sub text */
            --text-muted: #B39586;

            --border: #E8D0C5;
            /* More contrasting peach border */
            --border-focus: #E8739A;

            /* Warm Soft Shadows */
            --shadow-sm: 0 2px 12px rgba(180, 100, 80, 0.07);
            --shadow-md: 0 6px 24px rgba(180, 100, 80, 0.12);
            --shadow-lg: 0 12px 40px rgba(180, 100, 80, 0.14);

            --drag-over: #FFF0F5;

            /* Attendance Table Colors */
            --table-header: #FDF0EA;
            --table-border: #F0DDD4;
            --table-row-hover: #FFF5F0;

            /* Room pastel colors (spring) */
            --room-2-3: #7BB8F0;
            /* Sky Blue */
            --room-2-4: #7DD9C0;
            /* Mint */
            --room-2-5: #F4A76A;
            /* Peach */
            --room-2-6: #F07EAA;
            /* Rose */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            background-color: var(--bg-canvas);
            background-image:
                radial-gradient(circle at 15% 20%, rgba(248, 182, 196, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(255, 210, 180, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 240, 220, 0.08) 0%, transparent 60%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        header {
            max-width: 1300px;
            margin: 0 auto 40px;
            text-align: center;
            padding: 36px 40px;
            background: linear-gradient(135deg, #FFFBF7 0%, #FFF2EC 100%);
            border-radius: 28px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '🌸';
            position: absolute;
            top: -10px;
            right: 30px;
            font-size: 5rem;
            opacity: 0.08;
            pointer-events: none;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.03em;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 11px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-sub);
            font-size: 0.93rem;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            background: #FFF0EA;
            color: var(--text-main);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #D4628A 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 16px rgba(232, 115, 154, 0.35);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #B84E73 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 115, 154, 0.45);
        }

        .btn-danger {
            background: #FFF5F5;
            color: #E07070;
            border: 1.5px solid #F5D0D0;
        }

        .btn-danger:hover {
            background: #FFE8E8;
            color: #C05050;
        }

        .day-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, #D4628A 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 14px rgba(232, 115, 154, 0.4);
        }

        /* Layout Grid */
        .seating-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .classroom-section {
            background: var(--card-bg);
            padding: 36px 40px;
            border-radius: 28px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .classroom-section:hover {
            box-shadow: var(--shadow-md);
        }

        /* little petal deco */
        .classroom-section::after {
            content: '';
            position: absolute;
            bottom: -30px;
            right: -20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(248, 182, 196, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .grid-6x5 {
            display: grid;
            grid-template-columns: 1fr 1fr 40px 1fr 1fr 40px 1fr 1fr;
            row-gap: 14px;
            margin: 28px 0;
        }

        .seat {
            aspect-ratio: 1 / 1.15;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #FDF4EB 0%, #F8EBE2 100%);
            font-size: 0.85rem;
            position: relative;

            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            box-shadow: 0 2px 8px rgba(180, 100, 80, 0.06);
        }

        .seat:not(.empty):hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 20px rgba(232, 115, 154, 0.2);
            border-color: var(--primary);
            z-index: 10;
        }

        .seat.empty {
            border: 1.5px dashed var(--text-muted);
            background: #FAEFDF;
            box-shadow: none;
            cursor: default;
            opacity: 0.5;
        }

        .seat.drag-over {
            background: var(--secondary);
            border-color: var(--primary);
            border-style: solid;
            transform: scale(1.04);
        }

        .student-id {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 2px;
            pointer-events: none;
        }

        .student-name {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-main);
            pointer-events: none;
            letter-spacing: -0.03em;
        }

        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #F07EAA, #E8739A);
            color: white;
            padding: 16px 28px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 8px 28px rgba(232, 115, 154, 0.4);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.01em;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .spacer {
            pointer-events: none;
        }

        /* Info text */
        .info-text {
            font-size: 0.88rem;
            color: var(--text-sub);
            background: rgba(255, 248, 244, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Attendance List */
        .attendance-container {
            max-width: 1000px;
            margin: 0 auto;
            display: none;
            flex-direction: column;
            gap: 36px;
        }

        .attendance-section {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--border);
        }

        .attendance-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 16px;
            font-size: 0.95rem;
        }

        .attendance-table th,
        .attendance-table td {
            padding: 14px 16px;
            text-align: center;
            border-bottom: 1px solid var(--table-border);
        }

        .attendance-table th {
            background-color: var(--table-header);
            font-weight: 700;
            color: var(--text-sub);
        }

        .attendance-table tr:last-child td {
            border-bottom: none;
        }

        .attendance-table tr:hover td {
            background-color: var(--table-row-hover);
        }

        .attendance-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .col-num {
            width: 50px;
        }

        .col-id {
            width: 90px;
        }

        .col-name {
            width: 80px;
        }

        .col-check {
            width: 100px;
            white-space: nowrap;
        }

        .col-remark {
            width: auto;
        }

        .attendance-remark {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #FFFBF8;
            color: var(--text-main);
        }

        .attendance-remark:focus {
            border-color: var(--primary);
            background: white;
            outline: none;
            box-shadow: 0 0 0 3px rgba(232, 115, 154, 0.15);
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #FFF0EA;
            padding: 6px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .toggle-btn {
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-sub);
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            background: rgba(232, 115, 154, 0.1);
            color: var(--primary);
        }

        .toggle-btn.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 10px rgba(232, 115, 154, 0.2);
        }

        .gas-config {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        .gas-config input {
            flex: 1;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            background: #FFFBF8;
        }

        .btn-save-sheet {
            margin-top: 20px;
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7DD9C0 0%, #5CC4AB 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(93, 196, 170, 0.3);
        }

        .btn-save-sheet:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .btn-save-sheet:disabled {
            background: #D0C8C2;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Classroom Header */
        .classroom-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .room-title {
            font-size: 2.1rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -0.04em;
            line-height: 1.1;
        }

        .room-notice {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .room-meta {
            font-size: 0.92rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #D4628A 100%);
            padding: 6px 18px;
            border-radius: 50px;
            letter-spacing: -0.01em;
            white-space: nowrap;
            align-self: flex-start;
            box-shadow: 0 3px 10px rgba(232, 115, 154, 0.3);
        }

        /* Room color top-bar accent */
        .classroom-section[data-room="2-3"] {
            border-top: 5px solid var(--room-2-3);
        }

        .classroom-section[data-room="2-4"] {
            border-top: 5px solid var(--room-2-4);
        }

        .classroom-section[data-room="2-5"] {
            border-top: 5px solid var(--room-2-5);
        }

        .classroom-section[data-room="2-6"] {
            border-top: 5px solid var(--room-2-6);
        }

        .room-title.color-2-3 {
            color: var(--room-2-3);
        }

        .room-title.color-2-4 {
            color: var(--room-2-4);
        }

        .room-title.color-2-5 {
            color: var(--room-2-5);
        }

        .room-title.color-2-6 {
            color: var(--room-2-6);
        }

        /* Print Styles */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            header,
            button,
            .controls,
            .view-toggle,
            #toast,
            .info-text,
            .blossom-container,
            .tree-bg,
            .login-overlay,
            .gas-config {
                display: none !important;
            }

            .seating-container {
                gap: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                display: block !important;
            }

            .classroom-section {
                box-shadow: none !important;
                border-radius: 0 !important;
                margin: 0 !important;
                padding: 8mm !important;
                page-break-after: always !important;
                width: 210mm !important;
                height: 297mm !important;
                box-sizing: border-box !important;
                display: flex !important;
                flex-direction: column !important;
                background: white !important;
                border: none !important;
                overflow: hidden !important;
                transform: none !important;
            }

            .classroom-section[data-room="2-5"] {
                border-top: 8px solid #f59e0b !important;
            }

            .classroom-section[data-room="2-6"] {
                border-top: 8px solid #D0021B !important;
            }

            .classroom-section[data-room="2-3"] {
                border-top: 8px solid #4A90E2 !important;
            }

            .classroom-section[data-room="2-4"] {
                border-top: 8px solid #50E3C2 !important;
            }

            .classroom-section[data-room="1-5"] {
                border-top: 8px solid #f59e0b !important;
            }

            .classroom-section[data-room="1-6"] {
                border-top: 8px solid #f43f5e !important;
            }

            .classroom-section[data-room="1-3"] {
                border-top: 8px solid #6366f1 !important;
            }

            .classroom-section[data-room="1-4"] {
                border-top: 8px solid #10b981 !important;
            }

            .classroom-header {
                display: flex !important;
                justify-content: space-between !important;
                align-items: center !important;
                border-bottom: 2px solid #e2e8f0 !important;
                margin-bottom: 5mm !important;
                padding-bottom: 3mm !important;
                flex-shrink: 0 !important;
            }

            .room-title {
                font-size: 1.8rem !important;
                font-weight: 900 !important;
                color: #0f172a !important;
            }

            .room-notice {
                display: none !important;
            }

            .room-meta {
                font-size: 0.95rem !important;
                color: #475569 !important;
                font-weight: 700 !important;
            }

            .blackboard {
                height: 30px !important;
                width: 55% !important;
                margin: 0 auto 4mm !important;
                flex-shrink: 0 !important;
                background: #1e293b !important;
                color: white !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                font-size: 1rem !important;
            }

            .grid-6x5 {
                flex: 1 !important;
                row-gap: 3mm !important;
                column-gap: 0 !important;
                grid-template-columns: 1fr 1fr 5mm 1fr 1fr 5mm 1fr 1fr !important;
                margin: 0 !important;
                overflow: hidden !important;
            }

            /* Reset aspect-ratio so cards don't overflow */
            .seat {
                aspect-ratio: unset !important;
                border: 1.5px solid #cbd5e1 !important;
                border-radius: 8px !important;
                background: white !important;
                box-shadow: none !important;
                height: 100% !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
                overflow: hidden !important;
                transform: none !important;
                transition: none !important;
                padding: 2px !important;
            }

            .seat.empty {
                border: 1px dashed #cbd5e1 !important;
                background: #f8fafc !important;
            }

            .student-name {
                font-size: 1.05rem !important;
                color: #0f172a !important;
                font-weight: 800 !important;
                line-height: 1.2 !important;
                margin: 0 !important;
                word-break: keep-all !important;
                text-align: center !important;
            }

            .student-id {
                font-size: 0.65rem !important;
                color: #64748b !important;
                font-weight: 600 !important;
                margin-bottom: 1px !important;
            }

            .seat-num-badge {
                font-size: 0.6rem !important;
                color: #94a3b8 !important;
            }

            .seat.absent {
                background: #fff0f3 !important;
                border-color: #ff4d4f !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .seat.present {
                background: #f0fdf4 !important;
                border-color: #4caf50 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .spacer {
                display: block !important;
            }
        }

        /* Login Overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 250, 252, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 15px;
            color: var(--text-main);
            font-size: 1.8rem;
            font-weight: 800;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
            margin-top: 10px;
            font-family: inherit;
        }

        .login-box input:focus {
            border-color: var(--primary);
        }

        .login-box button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
                background-size: 16px 16px;
            }

            header {
                padding: 25px 15px;
                border-radius: 16px;
                margin-bottom: 25px;
            }

            h1 {
                font-size: 1.5rem;
                text-align: center;
                justify-content: center;
                word-break: keep-all;
                flex-wrap: wrap;
            }

            .classroom-section {
                padding: 20px 15px;
                border-radius: 20px;
            }

            .room-title {
                font-size: 1.4rem;
            }

            .grid-6x5 {
                grid-template-columns: repeat(6, 1fr);
                gap: 8px;
                margin: 20px 0;
            }

            .grid-6x5 .spacer {
                display: none;
            }

            .seat {
                border-radius: 8px;
                font-size: 0.75rem;
                aspect-ratio: 1 / 1.2;
            }

            .student-name {
                font-size: 0.95rem;
            }

            .student-id {
                font-size: 0.65rem;
                margin-bottom: 0;
            }

            .teacher-desk {
                width: 100%;
                height: 36px;
                font-size: 0.9rem;
                margin-top: 15px;
            }

            /* Table Scroller for Mobile */
            .table-responsive {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin-top: 15px;
                border-radius: 12px;
            }

            .attendance-table {
                margin-top: 0;
                min-width: 100%;
                /* Changed from 480px to 100% to fit screen */
                table-layout: fixed;
            }

            .attendance-table th,
            .attendance-table td {
                padding: 8px 4px;
                font-size: 0.85rem;
                word-wrap: break-word;
            }

            .attendance-checkbox {
                width: 24px;
                height: 24px;
            }

            /* Adjust column widths for mobile */
            .col-num {
                width: 35px !important;
                padding: 8px 2px !important;
            }

            .col-id {
                width: 65px !important;
            }

            .col-name {
                width: 60px !important;
            }

            .col-check {
                width: 65px !important;
            }

            .col-remark {
                width: auto !important;
            }

            .attendance-remark {
                font-size: 0.8rem;
                padding: 5px;
            }

            /* Larger touch target */

            /* Buttons and Controls */
            .btn {
                padding: 10px 16px;

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            return lines.slice(1).map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        values.push(current);
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current);
                const obj = {};
                headers.forEach((header, i) => obj[header] = values[i]);
                return obj;
            });
        }

        const globalData = parseCSV(rawData);

        // 오늘 요일 자동 감지 및 초기값 설정
        const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
        const todayIdx = new Date().getDay();
        const initialDay = (todayIdx >= 1 && todayIdx <= 5) ? daysMap[todayIdx] : '월';

        let currentDay = initialDay;
        let currentMode = 'seating';
        let currentPeriod = '1';

        function selectPeriod(btn) {
            document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPeriod = btn.dataset.period;
            if (currentMode === 'attendance') renderAttendance();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btnSeating').classList.toggle('active', mode === 'seating');
            document.getElementById('btnAttendance').classList.toggle('active', mode === 'attendance');

            const seatingDisp = document.getElementById('seatingDisplay');
            const attendanceDisp = document.getElementById('attendanceDisplay');

            if (mode === 'seating') {
                seatingDisp.style.display = 'flex';
                seatingDisp.classList.add('active');
                attendanceDisp.style.display = 'none';
                attendanceDisp.classList.remove('active');
                document.getElementById('btnResetArrangement').style.display = 'inline-block';
                document.getElementById('btnResetAttendance').style.display = 'none';
                renderSeating();
            } else {
                seatingDisp.style.display = 'none';
                seatingDisp.classList.remove('active');
                attendanceDisp.style.display = 'flex';
                attendanceDisp.classList.add('active');
                document.getElementById('btnResetArrangement').style.display = 'none';
                document.getElementById('btnResetAttendance').style.display = 'inline-block';
                renderAttendance();
            }
        }

        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDay = btn.dataset.day;
                if (currentMode === 'seating') renderSeating();
                else renderAttendance();
            });
        });

        function getRoomStudents(day) {
            const col1 = `${day}1`;
            const col2 = `${day}2`;
            const bothP = globalData.filter(s => s[col1] === '1' && s[col2] === '1').sort((a, b) => a.학번.localeCompare(b.학번));
            const half = Math.ceil(bothP.length / 2);

            let p1Only = globalData.filter(s => s[col1] === '1' && s[col2] !== '1').sort((a, b) => a.학번.localeCompare(b.학번));
            let p2Only = globalData.filter(s => s[col1] !== '1' && s[col2] === '1').sort((a, b) => a.학번.localeCompare(b.학번));

            // 목요일 예외 처리: 2-5반 1교시 학생 중 학번 기준 뒷번호 7명을 2-6반으로 이동
            if (day === '목' && p1Only.length > 7) {
                const moveCount = 7;
                const p1For2_5 = p1Only.slice(0, p1Only.length - moveCount);
                const p1For2_6 = p1Only.slice(p1Only.length - moveCount);
                return {
                    '2-3': bothP.slice(0, half),
                    '2-4': bothP.slice(half),
                    '2-5': p1For2_5,
                    '2-6': [...p1For2_6, ...p2Only].sort((a, b) => a.학번.localeCompare(b.학번))
                };
            }

            // 수요일 예외 처리: 정하윤(20221), 김규민(20902) 학생을 2-5반으로 이동
            if (day === '수') {
                const moveIds = ['20221', '20902'];
                const moveStudents = p2Only.filter(s => moveIds.includes(s.학번));
                p2Only = p2Only.filter(s => !moveIds.includes(s.학번));
                p1Only = [...p1Only, ...moveStudents].sort((a, b) => a.학번.localeCompare(b.학번));
            }

            // 금요일 예외 처리: 김규민(20902), 이소민(20214), 최창아(20525), 신채연(20915) 2-5반으로 이동
            if (day === '금') {
                const moveIds = ['20902', '20214', '20525', '20915'];
                const moveStudents = p2Only.filter(s => moveIds.includes(s.학번));
                p2Only = p2Only.filter(s => !moveIds.includes(s.학번));
                p1Only = [...p1Only, ...moveStudents].sort((a, b) => a.학번.localeCompare(b.학번));
            }

            return {
                '2-3': bothP.slice(0, half),
                '2-4': bothP.slice(half),
                '2-5': p1Only,
                '2-6': p2Only
            };
        }

        function renderSeating() {
            const display = document.getElementById('seatingDisplay');
            display.innerHTML = '';
            const roomStudents = getRoomStudents(currentDay);
            const rooms = ['2-3', '2-4', '2-5', '2-6'];

            // 현재 실제 요일 계산 (0: 일요일, 1: 월요일, ..., 6: 토요일)
            const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
            const todayIndex = new Date().getDay();
            const actualToday = daysMap[todayIndex];
            const isToday = currentDay === actualToday;

            rooms.forEach(roomName => {
                const students = roomStudents[roomName];
                if (students.length === 0) return;

                const storageKey = `yajaArrangement_${currentDay}_${roomName}`;
                let savedIds = JSON.parse(localStorage.getItem(storageKey));
                let gridSeats = new Array(30).fill(null);
                const currentStudentMap = {};
                students.forEach(s => currentStudentMap[s.학번] = s);

                if (savedIds) {
                    savedIds.forEach((id, idx) => {
                        if (id && currentStudentMap[id]) {
                            gridSeats[idx] = currentStudentMap[id];
                            delete currentStudentMap[id];
                        }
                    });
                    fillZigzag(gridSeats, Object.values(currentStudentMap).sort((a, b) => a.학번.localeCompare(b.학번)));
                } else {
                    fillZigzag(gridSeats, students);
                }
                saveToStorage(roomName, gridSeats);

                const section = document.createElement('div');
                section.className = 'classroom-section';
                section.setAttribute('data-room', roomName);
                const roomColorClass = 'color-' + roomName;
                section.innerHTML = `
            <div class="classroom-header">
                <div class="header-left">
                    <span class="room-title ${roomColorClass}">${roomName}반</span>
                    <span class="room-notice">3/16(월) 이전까지는 자유롭게 위치를 변경할 수 있습니다. 변경사항이 있으면 2학년부 박상현 선생님에게 오세요.</span>
                </div>
                <span class="room-meta">${currentDay}요일 | ${students.length}명</span>
            </div>
            <div class="grid-6x5"></div>
            <div class="teacher-desk"></div>
        `;

                const grid = section.querySelector('.grid-6x5');
                gridSeats.forEach((student, i) => {
                    const col = i % 6;
                    if (col === 2 || col === 4) grid.appendChild(Object.assign(document.createElement('div'), { className: 'spacer' }));

                    const seat = document.createElement('div');
                    seat.className = 'seat' + (student ? '' : ' empty');
                    seat.setAttribute('draggable', student ? 'true' : 'false');
                    seat.setAttribute('data-index', i);
                    seat.innerHTML = "";
                    if (student) {
                        seat.innerHTML += `
                    <div class="student-id">${student.학번}</div>
                    <div class="student-name">${student.이름}</div>
                `;
                    }
                    seat.addEventListener('dragstart', handleDragStart);
                    seat.addEventListener('dragover', handleDragOver);
                    seat.addEventListener('dragleave', handleDragLeave);
                    seat.addEventListener('drop', handleDrop);
                    grid.appendChild(seat);
                });
                display.appendChild(section);
            });
        }

        function fillZigzag(grid, students) {
            let sIdx = 0;
            for (let row = 4; row >= 0; row--) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    if (!grid[idx] && (row + col) % 2 === 0 && sIdx < students.length) grid[idx] = students[sIdx++];
                }
            }
            if (sIdx < students.length) {
                for (let row = 4; row >= 0; row--) {
                    for (let col = 0; col < 6; col++) {
                        const idx = row * 6 + col;
                        if (!grid[idx] && sIdx < students.length) grid[idx] = students[sIdx++];
                    }
                }
            }
        }

        let draggedElement = null;
        function handleDragStart(e) { draggedElement = this; e.dataTransfer.setData('text/plain', this.dataset.index); this.style.opacity = '0.4'; }
        function handleDragOver(e) { e.preventDefault(); this.classList.add('drag-over'); }
        function handleDragLeave() { this.classList.remove('drag-over'); }
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (draggedElement) draggedElement.style.opacity = '1';
            const sIdx = parseInt(e.dataTransfer.getData('text/plain'));
            const tIdx = parseInt(this.dataset.index);
            const sRoom = draggedElement.parentElement.parentElement.dataset.room;
            const tRoom = this.parentElement.parentElement.dataset.room;
            if (sRoom !== tRoom || sIdx === tIdx) return;
            const k = `yajaArrangement_${currentDay}_${sRoom}`;
            let arr = JSON.parse(localStorage.getItem(k));
            [arr[sIdx], arr[tIdx]] = [arr[tIdx], arr[sIdx]];
            localStorage.setItem(k, JSON.stringify(arr));
            showToast();
            renderSeating();
        }
        function saveToStorage(roomName, gridSeats) {
            localStorage.setItem(`yajaArrangement_${currentDay}_${roomName}`, JSON.stringify(gridSeats.map(s => s ? s.학번 : "")));
        }
        function showToast(msg = '배치 정보가 자동 저장되었습니다.') {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<span>✅</span> ${msg}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        function resetArrangement() {
            if (!confirm('현재 요일의 모든 배치를 초기화하시겠습니까?')) return;
            Object.keys(localStorage).filter(k => k.startsWith(`yajaArrangement_${currentDay}_`)).forEach(k => localStorage.removeItem(k));
            showToast('배치가 초기화되었습니다.');
            renderSeating();
        }
        function resetAttendance() {
            if (!confirm(`현재 요일(${currentDay}요일)의 출석 체크 내역을 모두 초기화하시겠습니까?`)) return;
            Object.keys(sessionStorage).filter(k => k.startsWith(`att_${currentDay}_`)).forEach(k => sessionStorage.removeItem(k));
            showToast('출석 데이터가 초기화되었습니다.');
            renderAttendance();
        }
        function renderAttendance() {
            const display = document.getElementById('attendanceDisplay');
            display.innerHTML = '';

            // 교시 선택 UI
            const periodSelector = document.createElement('div');
            periodSelector.style.cssText = 'display:flex;gap:10px;margin-bottom:20px;justify-content:center;';
            periodSelector.innerHTML = `
                <button class="btn day-btn ${currentPeriod === '1' ? 'active' : ''}" data-period="1" onclick="selectPeriod(this)">1교시</button>
                <button class="btn day-btn ${currentPeriod === '2' ? 'active' : ''}" data-period="2" onclick="selectPeriod(this)">2교시</button>
            `;
            display.appendChild(periodSelector);

            const roomStudents = getRoomStudents(currentDay);
            const rooms = ['2-3', '2-4', '2-5', '2-6'];

            // 현재 실제 요일 계산 (0: 일요일, 1: 월요일, ..., 6: 토요일)
            const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
            const todayIndex = new Date().getDay();
            const actualToday = daysMap[todayIndex];
            const isToday = currentDay === actualToday;


            rooms.forEach(roomName => {
                const students = roomStudents[roomName];
                if (students.length === 0) return;

                const section = document.createElement('div');
                section.className = 'attendance-section';
                section.innerHTML = `
                    <div class="classroom-header">
                        <span class="room-title">${roomName}반 출석부 (${currentPeriod}교시)</span>
                        <span class="room-meta">${currentDay}요일 | 총 ${students.length}명</span>
                    </div>
                    <div class="table-responsive">
                        <table class="attendance-table">
                            <thead>
                                <tr>
                                    <th class="col-num">번호</th>
                                    <th class="col-id">학번</th>
                                    <th class="col-name">이름</th>
                                    <th class="col-check">출석여부</th>
                                    <th class="col-remark">비고</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${students.map((s, idx) => {
                    const stateKey = `att_${currentDay}_${currentPeriod}_${s.학번}`;
                    const remarkKey = `rem_${currentDay}_${currentPeriod}_${s.학번}`;
                    const isChecked = sessionStorage.getItem(stateKey) === 'true';
                    const remarkValue = sessionStorage.getItem(remarkKey) || '';
                    return `
                                    <tr style="${!isToday ? 'opacity: 0.6; background-color: #f8fafc;' : ''}">
                                        <td>${idx + 1}</td>
                                        <td>${s.학번}</td>
                                        <td style="font-weight: 700;">${s.이름}</td>
                                        <td><input type="checkbox" class="attendance-checkbox" data-id="${s.학번}" ${isChecked ? 'checked' : ''} ${!isToday ? 'disabled' : ''} onchange="sessionStorage.setItem('${stateKey}', this.checked)"></td>
                                        <td><input type="text" class="attendance-remark" data-id="${s.학번}" value="${remarkValue}" placeholder="비고 입력" ${!isToday ? 'disabled' : ''} onchange="sessionStorage.setItem('${remarkKey}', this.value)"></td>
                                    </tr>
                                    `;
                }).join('')}
                            </tbody>
                        </table>
                    </div>
                    ${!isToday ? `<div style="color: #ef4444; font-size: 0.9rem; margin-top: 15px; text-align: center; font-weight: 600;">⚠️ 오늘은 ${actualToday}요일입니다. ${currentDay}요일 출석체크는 불가능합니다.</div>` : ''}
                    <button class="btn-save-sheet" onclick="saveAttendanceToSheet('${roomName}', this)" ${!isToday ? 'disabled style="background: #9ca3af; cursor: not-allowed;"' : ''}>💾 ${currentPeriod}교시 ${roomName}반 출석 시트로 저장</button>
                `;
                display.appendChild(section);
            });
        }

        async function saveAttendanceToSheet(roomName, btn) {
            // 이중 안전 장치: 다시 한번 현재 요일 확인
            const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
            const actualToday = daysMap[new Date().getDay()];
            if (currentDay !== actualToday) {
                alert(`오늘은 ${actualToday}요일입니다. ${currentDay}요일 출석체크는 불가능합니다.`);
                return;
            }

            const gasUrl = document.getElementById('gasUrl').value.trim();
            if (!gasUrl) {
                alert('먼저 Google Apps Script URL을 입력해주세요.');
                return;
            }

            if (!confirm(`${roomName}반 출석 데이터를 Google 시트로 전송하시겠습니까?`)) return;

            const roomStudents = getRoomStudents(currentDay)[roomName];
            const section = btn.closest('.attendance-section');
            const checkboxes = section.querySelectorAll('.attendance-checkbox');

            const attendanceData = {
                date: new Date().toLocaleDateString('ko-KR'),
                day: currentDay,
                period: currentPeriod + '교시',
                room: roomName,
                supervisor: supervisorName, // 감독 교사 데이터 추가
                students: roomStudents.map((s, idx) => {
                    const checkbox = section.querySelector(`.attendance-checkbox[data-id="${s.학번}"]`);
                    const remarkInput = section.querySelector(`.attendance-remark[data-id="${s.학번}"]`);
                    return {
                        id: s.학번,
                        name: s.이름,
                        status: checkbox ? checkbox.checked : false,
                        remark: remarkInput ? remarkInput.value : ""
                    };
                })
            };

            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '⌛ 전송 중...';

            try {
                const response = await fetch(gasUrl, {
                    method: 'POST',
                    mode: 'no-cors', // GAS web apps often require no-cors for simple requests from different origins
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(attendanceData)
                });

                // Note: with no-cors, we won't be able to read the response object, but we can assume success if no error is thrown
                alert(`${roomName}반 데이터 전송 완료! (구글 시트에서 확인해 주세요)`);
            } catch (error) {
                console.error('Error saving to sheet:', error);
                alert('전송 중 오류가 발생했습니다. 콘솔 로그를 확인해 주세요.');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        // 요일 버튼 초기 활성화
        const activeBtn = document.querySelector(`.day-btn[data-day="${currentDay}"]`);
        if (activeBtn) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        renderSeating();
    </script>
